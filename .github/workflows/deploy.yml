# Deploy GitHub Pages con JSX precompilato (niente babel nel browser).
# ATTENZIONE: diventa attivo solo dopo il merge in main E dopo aver impostato
# Settings → Pages → Source = "GitHub Actions" (vedi docs/IMPLEMENTAZIONI.md).
name: Build & Deploy Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Compila JSX
        run: |
          npm install --no-audit --no-fund esbuild@0.24.0
          node scripts/build.js
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
