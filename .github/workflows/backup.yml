name: Backup Supabase DB
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Export tables via Supabase REST API
        env:
          SUPABASE_URL: "https://divxqcadlishdfhpvixd.supabase.co"
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          mkdir -p backup
          TABLES=("events" "profiles" "activity_log" "telegram_subscriptions" "app_config" "ferie")
          for TABLE in "${TABLES[@]}"; do
            echo "Esportando $TABLE..."
            curl -s \
              -H "apikey: ${SUPABASE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" \
              -H "Accept: application/json" \
              "${SUPABASE_URL}/rest/v1/${TABLE}?select=*" \
              -o "backup/${TABLE}.json"
            echo "  → $(wc -c < backup/${TABLE}.json) bytes"
          done
          echo "{\"exported_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"project\": \"divxqcadlishdfhpvixd\"}" \
            > backup/meta.json

      - name: Create archive
        run: |
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          tar -czf "backup_${TIMESTAMP}.tar.gz" backup/
          echo "BACKUP_FILE=backup_${TIMESTAMP}.tar.gz" >> $GITHUB_ENV

      - name: Encrypt backup
        env:
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        run: |
          echo "${BACKUP_ENCRYPTION_KEY}" > /tmp/passphrase.txt
          gpg --batch --yes \
            --passphrase-file /tmp/passphrase.txt \
            --symmetric --cipher-algo AES256 \
            "${{ env.BACKUP_FILE }}"
          rm "${{ env.BACKUP_FILE }}" /tmp/passphrase.txt
          echo "BACKUP_FILE=${{ env.BACKUP_FILE }}.gpg" >> $GITHUB_ENV

      - name: Checkout backup repo
        uses: actions/checkout@v4
        with:
          repository: rdvrdv-app/bacheca-backups
          token: ${{ secrets.BACKUP_REPO_TOKEN }}
          path: backup-repo

      - name: Commit backup
        run: |
          cp "${{ env.BACKUP_FILE }}" backup-repo/
          cd backup-repo
          ls -t backup_*.tar.gz.gpg 2>/dev/null | tail -n +31 | xargs -r rm
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Backup: ${{ env.BACKUP_FILE }}" || echo "Nessuna modifica"
          git push

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}" \
            --data-urlencode "text=❌ Backup Bacheca FALLITO il $(date '+%d/%m/%Y alle %H:%M')"
