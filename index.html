// ── Helpers ───────────────────────────────────────────────────
const getDaysInMonth = (y, m) => new Date(y, m + 1, 0).getDate();
// Offset della prima cella con settimana che inizia di lunedì (Lun=0 … Dom=6)
const getFirstDay    = (y, m) => (new Date(y, m, 1).getDay() + 6) % 7;
const toDateStr      = (y, m, d) => `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
const openMaps       = addr => window.open("https://maps.google.com/?q=" + encodeURIComponent(addr), "_blank");
// Ferie attive in un dato giorno (ds = "YYYY-MM-DD"): il confronto stringa ISO è ordinabile
const ferieOnDay     = (ferie, ds) => (ferie||[]).filter(f => f.start_date <= ds && ds <= f.end_date);
// Formatta una data in GG-MM-AAAA (es. 03-06-2026). Accetta "YYYY-MM-DD" o un timestamp/Date.
const fmtDate = v => {
  if (!v) return "";
  let y, mo, d;
  if (typeof v === "string" && /^\d{4}-\d{2}-\d{2}/.test(v)) { [y, mo, d] = v.slice(0,10).split("-"); }
  else { const dt = new Date(v); if (isNaN(dt)) return ""; y = dt.getFullYear(); mo = String(dt.getMonth()+1).padStart(2,"0"); d = String(dt.getDate()).padStart(2,"0"); }
  return `${d}-${mo}-${y}`;
};
const fmtFerie       = ds => fmtDate(ds);

// ── Eventi multi-giorno ───────────────────────────────────────
const WHOLE_PERIOD     = "Tutto il periodo";
const isMultiDay       = e => !!(e && e.end_date && e.date && e.end_date > e.date);
const eventCoversDay   = (e, ds) => !!(e && e.date) && ds >= e.date && ds <= (e.end_date || e.date);
const dateRange = (start, end) => {
  if (!start) return [];
  if (!end || end <= start) return [start];
  const out = []; const d = new Date(start+"T00:00:00"); const last = new Date(end+"T00:00:00");
  while (d <= last) { out.push(toDateStr(d.getFullYear(), d.getMonth(), d.getDate())); d.setDate(d.getDate()+1); }
  return out;
};
const dayOptLabel      = ds => { const dt = new Date(ds+"T00:00:00"); return `${dt.toLocaleDateString("it-IT",{weekday:"short"})} ${fmtDate(ds)}`; };
const buildMultiDayOptions = (start, end) => [...dateRange(start, end).map(dayOptLabel), WHOLE_PERIOD];
const fmtDateRange     = e => isMultiDay(e) ? `${fmtDate(e.date)} → ${fmtDate(e.end_date)}` : fmtDate(e.date);

const daysUntil = deadline => {
  if (!deadline) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  const d = new Date(deadline); d.setHours(0,0,0,0);
  return Math.round((d - t) / 86400000);
};

const eventBadge = (date) => {
  if (!date) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  const d = new Date(date + "T00:00:00"); d.setHours(0,0,0,0);
  const diff = Math.round((d - t) / 86400000);
  if (diff === 0) return { label: "🔔 Oggi",   bg: LIGHT.danger, color: "#fff" };
  if (diff === 1) return { label: "📅 Domani", bg: LIGHT.ok,     color: "#fff" };
  return null;
};

// ── Esporta in calendario (Google Calendar / Outlook) ─────────
const addDaysStr = (ds, n) => { const d = new Date(ds+"T00:00:00"); d.setDate(d.getDate()+n); return toDateStr(d.getFullYear(), d.getMonth(), d.getDate()); };
// Con orario: blocco di 2 ore; senza orario o multi-giorno: tutto il giorno (fine esclusiva)
const calendarDates = e => {
  if (e.time && !isMultiDay(e)) {
    const [h, mn] = e.time.split(":").map(Number);
    const stamp = (hh, mm) => `${e.date.replace(/-/g,"")}T${String(hh).padStart(2,"0")}${String(mm).padStart(2,"0")}00`;
    return { start: stamp(h, mn), end: stamp(Math.min(h+2, 23), mn), allDay: false };
  }
  return { start: e.date.replace(/-/g,""), end: addDaysStr(e.end_date || e.date, 1).replace(/-/g,""), allDay: true };
};
const googleCalUrl = e => {
  const { start, end } = calendarDates(e);
  const p = new URLSearchParams({ action:"TEMPLATE", text:e.title||"Evento", dates:`${start}/${end}`, details:e.notes||"", location:e.address||"" });
  return "https://calendar.google.com/calendar/render?" + p.toString();
};
// Outlook / Hotmail: deeplink di composizione evento (date ISO, allday per gli eventi senza orario)
const outlookCalUrl = e => {
  const pad = n => String(n).padStart(2,"0");
  let startdt, enddt, allday;
  if (e.time && !isMultiDay(e)) {
    const [h, mn] = e.time.split(":").map(Number);
    startdt = `${e.date}T${pad(h)}:${pad(mn)}:00`;
    enddt   = `${e.date}T${pad(Math.min(h+2,23))}:${pad(mn)}:00`;
    allday  = false;
  } else {
    startdt = e.date;
    enddt   = addDaysStr(e.end_date || e.date, 1);
    allday  = true;
  }
  const p = new URLSearchParams({ path:"/calendar/action/compose", rru:"addevent", subject:e.title||"Evento", startdt, enddt, body:e.notes||"", location:e.address||"" });
  if (allday) p.set("allday", "true");
  return "https://outlook.live.com/calendar/0/deeplink/compose?" + p.toString();
};

const validatePassword = p => {
  if (p.length < 8)             return "Min. 8 caratteri.";
  if (!/[A-Z]/.test(p))         return "Serve almeno una maiuscola.";
  if (!/[a-z]/.test(p))         return "Serve almeno una minuscola.";
  if (!/[0-9]/.test(p))         return "Serve almeno un numero.";
  if (!/[^a-zA-Z0-9]/.test(p)) return "Serve almeno un carattere speciale.";
  return null;
};

// Visibilità: true se l'utente può vedere l'evento
const canSeeEvent = (e, user, profile) => {
  if (profile?.role === "admin") return true;
  if (e.created_by && e.created_by === user?.id) return true;
  const vt = e.visible_to;
  if (!vt || (Array.isArray(vt) && vt.length === 0)) return true;
  return Array.isArray(vt) && vt.includes(user?.id);
};

function ItemRow({ item, th, onToggle, onDelete, onCost }) {
  const [confirm, setConfirm]   = useState(false);
  const [editCost, setEditCost] = useState(false);
  const [costVal, setCostVal]   = useState("");

  const openCost = () => { setCostVal(item.cost != null ? String(item.cost) : ""); setEditCost(true); setConfirm(false); };
  const saveCost = () => {
    const n = Number(costVal);
    onCost(item.id, costVal.trim() === "" || isNaN(n) || n < 0 ? null : n);
    setEditCost(false);
  };
  // Appena un articolo viene segnato come acquistato si chiede il costo (facoltativo)
  const handleToggle = () => { onToggle(item.id); if (!item.done) openCost(); else setEditCost(false); };
  const metaSep = (item.qty || item.assignee) ? " · " : "";

  return (
    <div style={{...cardSt(th), marginBottom: 8}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div onClick={handleToggle} style={{width:22,height:22,borderRadius:6,flexShrink:0,cursor:"pointer",border:`2px solid ${item.done?th.ok:th.accent}`,background:item.done?th.ok:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
          {item.done && <span style={{color:"#fff",fontSize:13,fontWeight:700}}>✓</span>}
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:600,color:item.done?th.sub:th.text,textDecoration:item.done?"line-through":"none"}}>{item.name}</div>
          <div style={{fontSize:12,color:th.sub,marginTop:2}}>
            {item.qty && `${item.qty} ${item.unit}`}{item.qty && item.assignee && " · "}{item.assignee && `👤 ${item.assignee}`}
            {item.done && (item.cost != null
              ? <span onClick={openCost} style={{cursor:"pointer",color:th.ok,fontWeight:700}}>{metaSep}💶 {fmtEur(item.cost)}</span>
              : <span onClick={openCost} style={{cursor:"pointer",color:th.accent}}>{metaSep}💶 aggiungi costo</span>)}

        </div>
        <button onClick={() => setConfirm(true)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:th.sub,padding:"4px"}}>✕</button>
      </div>
      {editCost && (
        <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${th.border}`}}>
          <div style={{fontSize:12,color:th.text,marginBottom:6}}>💶 Quanto è costato? <span style={{color:th.sub}}>(facoltativo)</span></div>

            <button onClick={saveCost} style={{...primBtn(th),fontSize:12,padding:"4px 12px"}}>Salva</button>
            <button onClick={() => setEditCost(false)} style={{...btnSt(th),fontSize:12,padding:"4px 12px"}}>{item.cost != null ? "Annulla" : "Salta"}</button>
          </div>
        </div>
      )}
      {confirm && (
        <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${th.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <span style={{fontSize:12,color:th.text}}>Eliminare <b>{item.name}</b>?</span>

}

// ── Password Recovery ─────────────────────────────────────────
function PasswordRecoveryView({ th, onDone }) {
  const [f, setF]       = useState({ new1: "", new2: "", err: "", ok: false });
  const [loading, setL] = useState(false);

  const save = async () => {
    const err = validatePassword(f.new1);
    if (err) return setF(p => ({...p, err}));
    if (f.new1 !== f.new2) return setF(p => ({...p, err: "Le password non coincidono."}));
    setL(true);
    const { error } = await sb.auth.updateUser({ password: f.new1 });
    setL(false);
    if (error) return setF(p => ({...p, err: error.message}));
    setF(p => ({...p, ok: true, err: ""}));
    setTimeout(onDone, 2000);
  };

  return (
    <div style={{minHeight:"100vh",background:th.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:40,marginBottom:8}}>🔑</div>
          <h1 style={{fontSize:22,fontWeight:700,color:th.text}}>Nuova password</h1>
          <p style={{fontSize:13,color:th.sub,marginTop:4}}>Scegli una nuova password per il tuo account.</p>
        </div>
        <div style={cardSt(th)}>
          <label style={labelSt(th)}>Nuova password</label>
          <input type="password" value={f.new1} onChange={e => setF(p => ({...p, new1: e.target.value}))} placeholder="Es. Ciao123!" style={inputSt(th)}/>
          <label style={labelSt(th)}>Conferma password</label>
          <input type="password" value={f.new2} onChange={e => setF(p => ({...p, new2: e.target.value}))} placeholder="Ripeti la password" style={inputSt(th)}/>
          {f.err && <div style={{color:th.danger,fontSize:13,marginBottom:12}}>{f.err}</div>}
          {f.ok  && <div style={{color:th.ok,fontSize:13,marginBottom:12}}>✅ Password aggiornata! Reindirizzamento...</div>}
          <button onClick={save} disabled={loading} style={{...primBtn(th),width:"100%",opacity:loading?.6:1}}>
            {loading ? "Salvataggio..." : "Salva nuova password"}
          </button>
        </div>
      </div>
    </div>
  );
}

function LoginView({ th, onGoRegister, onRecovery }) {
  const [email, setEmail]   = useState("");
  const [pass,  setPass]    = useState("");
  const [err,   setErr]     = useState("");
  const [loading, setL]     = useState(false);
  const [step,  setStep]    = useState("login");
  const [resetEmail, setRE] = useState("");
  const [otp,   setOtp]     = useState("");

  const login = async () => {
    setErr(""); setL(true);
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    setL(false);
    if (!error) return;
    if (error.message.toLowerCase().includes("email not confirmed"))
      setErr("📧 Devi confermare la tua email prima di accedere.");
    else if (error.message.toLowerCase().includes("invalid login"))
      setErr("Email o password errati.");
    else setErr(error.message);
  };

  const sendOtp = async () => {
    if (!resetEmail.trim()) return setErr("Inserisci la tua email.");
    setErr(""); setL(true);
    const { error } = await sb.auth.resetPasswordForEmail(resetEmail.trim());
    setL(false);
    if (error) return setErr(error.message);
    setStep("forgot_otp");
  };

  const verifyOtp = async () => {
    if (otp.trim().length < 8) return setErr("Inserisci il codice a 8 cifre.");
    setErr(""); setL(true);
    const { data, error } = await sb.auth.verifyOtp({ email: resetEmail.trim(), token: otp.trim(), type: "recovery" });
    setL(false);
    if (error) return setErr("Codice non valido o scaduto. Riprova.");
    if (data?.session) onRecovery(data.session.user);
  };

  const back = () => { setStep("login"); setErr(""); setOtp(""); };

  if (step === "forgot_email") return (
    <div style={{minHeight:"100vh",background:th.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:380}}>

function RegisterView({ th, onGoLogin }) {
  const [f, setF]       = useState({ name:"", email:"", pass:"", pass2:"" });
  const [err, setErr]   = useState("");
  const [ok,  setOk]    = useState(false);
  const [loading, setL] = useState(false);

  const register = async () => {
    setErr("");
    if (!f.name.trim())  return setErr("Inserisci il tuo nome.");
    if (!f.email.trim()) return setErr("Inserisci l'email.");
    const pwErr = validatePassword(f.pass);
    if (pwErr) return setErr(pwErr);
    if (f.pass !== f.pass2) return setErr("Le password non coincidono.");
    setL(true);
    const { data: nameTaken } = await sb.rpc("is_name_taken", { check_name: f.name.trim() });

function ProfileView({ th, user, profile, onBack, onLogout }) {

  useEffect(() => {
    sb.from("telegram_subscriptions").select("chat_id,prefs").eq("user_id", user.id).maybeSingle()
      .then(({ data, error }) => {
        if (!error && data) setTg(p => ({...p, chatId: data.chat_id, exists: true, prefs: { eventi:true, voti:true, ...(data.prefs||{}) }}));
        setTg(p => ({...p, loading: false}));
      });
  }, [user.id]);

  const saveProfile = async () => {
    await sb.from("profiles").update({ full_name: name }).eq("id", user.id);
    setSaved(true); setTimeout(() => setSaved(false), 2000);
  };

  const changePass = async () => {
    setPass(p => ({...p, err:"", ok:false}));
    const err = validatePassword(pass.new1);
    if (err) return setPass(p => ({...p, err}));
    if (pass.new1 !== pass.new2) return setPass(p => ({...p, err:"Le password non coincidono."}));
    const { error } = await sb.auth.updateUser({ password: pass.new1 });
    if (error) return setPass(p => ({...p, err:error.message}));
    setPass({ new1:"", new2:"", err:"", ok:true });
  };

  const saveTg = async () => {
    if (!tg.chatId.trim()) return;
    setTg(p => ({...p, err:""}));
    const op = tg.exists
      ? sb.from("telegram_subscriptions").update({ chat_id: tg.chatId, prefs: tg.prefs }).eq("user_id", user.id)
      : sb.from("telegram_subscriptions").insert({ user_id: user.id, chat_id: tg.chatId, prefs: tg.prefs });
    const { error } = await op;
    if (error) { setTg(p => ({...p, err:"Errore: " + error.message})); return; }
    setTg(p => ({...p, exists:true, saved:true}));
    setTimeout(() => setTg(p => ({...p, saved:false})), 2000);
  };

  // Preferenze per macro-funzionalità: salvataggio immediato se l'iscrizione esiste già
  const togglePref = async k => {
    const prefs = {...tg.prefs, [k]: tg.prefs[k] === false};

          <div style={{fontSize:11,marginTop:2,padding:"2px 8px",borderRadius:8,display:"inline-block",

      <div style={{...cardSt(th),marginBottom:16}}>
        <div style={sectTitle(th)}>Modifica profilo</div>
        <label style={labelSt(th)}>Nome</label>
        <input value={name} onChange={e => setName(e.target.value)} style={inputSt(th)}/>
        <button onClick={saveProfile} style={{...primBtn(th),width:"100%"}}>{saved ? "✅ Salvato!" : "Salva"}</button>
      </div>

      <div style={{...cardSt(th),marginBottom:16}}>
        <div style={sectTitle(th)}>🔔 Notifiche Telegram</div>
        <div style={{fontSize:12,color:th.sub,marginBottom:12,lineHeight:1.6}}>
          Per ricevere notifiche quando viene creato o modificato un evento:<br/><br/>

// ── Admin: coda di approvazione ───────────────────────────────
function ApprovalQueue({ th, pendingEvents, onPublish, onEdit, onDelete }) {
  const [catFilter, setCatFilter] = useState(null);

  const cats = useMemo(() => {
    const seen = new Set();
    for (const e of pendingEvents) {
      const c = e.discovery_meta?.category;
      if (c) seen.add(c);
    }
    return [...seen].sort();
  }, [pendingEvents]);

  const shown = catFilter ? pendingEvents.filter(e => e.discovery_meta?.category === catFilter) : pendingEvents;

  if (!pendingEvents.length)
    return <div style={{color:th.sub,fontSize:14,textAlign:"center",padding:20}}>Nessun evento in attesa di approvazione.</div>;
  return (
    <div>
      {cats.length > 1 && (
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
          <button onClick={() => setCatFilter(null)} style={{padding:"4px 12px",borderRadius:20,border:`1px solid ${!catFilter?th.accent:th.border}`,cursor:"pointer",fontSize:12,fontWeight:600,background:!catFilter?th.accent:th.input,color:!catFilter?"#fff":th.sub}}>Tutti ({pendingEvents.length})</button>
          {cats.map(c => {
            const n = pendingEvents.filter(e => e.discovery_meta?.category === c).length;
            const on = catFilter === c;
            return <button key={c} onClick={() => setCatFilter(on ? null : c)} style={{padding:"4px 12px",borderRadius:20,border:`1px solid ${on?th.accent:th.border}`,cursor:"pointer",fontSize:12,fontWeight:600,background:on?th.accent:th.input,color:on?"#fff":th.sub}}>{c} ({n})</button>;
          })}
        </div>
      )}
      {shown.map(e => (
        <div key={e.id} style={{...cardSt(th),marginBottom:10,border:`1px solid ${th.warn}66`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:6}}>

// Categorie di locale/evento, ricavate dalle tipologie reali censite in `venues`.
const VENUE_CATEGORIES = ["Aperitivo","DJ set","Disco","Latino & Caraibico","Beach & Pool party","Concerti & Live","Cena spettacolo","Feste a tema","Sagra & Folk","Karaoke","Quiz & Giochi","Teatro & Cabaret","Pranzo"];
const ABRUZZO_PROVINCES = ["Pescara","Teramo","Chieti","L'Aquila"];
const igHandleOf = u => { try { const parts = new URL(u).pathname.split("/").filter(Boolean); return parts[0] || ""; } catch { return ""; } };
// Distanza in km tra due punti {lat,lon} (formula dell'emisenoverso)
const kmBetween = (a, b) => {
  const R = 6371, toRad = d => d * Math.PI / 180;
  const dLat = toRad(b.lat - a.lat), dLon = toRad(b.lon - a.lon);
  const s = Math.sin(dLat/2)**2 + Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(s));
};
// Data odierna + n giorni (formato YYYY-MM-DD)
const datePlusDays = n => new Date(Date.now() + n * 86400000).toISOString().slice(0, 10);
// Coordinate da un indirizzo via geocoder Maps (OpenStreetMap/Nominatim, senza chiave)
async function geocodeAddress(q) {
  try {
    const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&countrycodes=it&q=${encodeURIComponent(q)}`;
    const r = await fetch(url, { headers: { "Accept": "application/json" } });
    if (!r.ok) return null;
    const arr = await r.json();
    if (!Array.isArray(arr) || !arr.length) return null;
    return { lat: Number(arr[0].lat), lon: Number(arr[0].lon) };
  } catch { return null; }
}

function VenueEditor({ th, venue, onSave, onDelete, onCancel, saving }) {

    name: venue?.name || "", instagram_url: venue?.instagram_url || "",
    city: venue?.city || "", province: venue?.province || "Pescara",
    address: venue?.address || "",
    categories: Array.isArray(venue?.categories) ? venue.categories : [], active: venue?.active !== false,
  }));
  const [geocoding, setGeocoding] = useState(false);
  const [confirmDel, setConfirmDel] = useState(false);
  const toggleC = c => setF(p => ({...p, categories: p.categories.includes(c) ? p.categories.filter(x=>x!==c) : [...p.categories, c]}));

  const submit = async () => {
    if (!f.name.trim()) return onSave(null, "Il nome è obbligatorio.");
    // Coordinate ricavate dall'indirizzo con Maps (servono per il filtro a raggio km).
    let lat = venue?.lat ?? null, lon = venue?.lon ?? null;

      city: f.city.trim() || null, province: f.province,
      address: f.address.trim() || null,
      lat, lon, categories: f.categories, active: f.active,

      <label style={labelSt(th)}>Nome *</label>
      <input value={f.name} onChange={e => setF(p => ({...p, name:e.target.value}))} style={inputSt(th)}/>
      <label style={labelSt(th)}>Profilo Instagram (URL)</label>
      <input value={f.instagram_url} onChange={e => setF(p => ({...p, instagram_url:e.target.value}))} placeholder="https://www.instagram.com/handle/" style={inputSt(th)}/>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1}}>
          <label style={labelSt(th)}>Città</label>
          <input value={f.city} onChange={e => setF(p => ({...p, city:e.target.value}))} style={inputSt(th)}/>
        </div>
        <div style={{flex:1}}>
          <label style={labelSt(th)}>Provincia</label>
          <select value={f.province} onChange={e => setF(p => ({...p, province:e.target.value}))} style={inputSt(th)}>
            {ABRUZZO_PROVINCES.map(p => <option key={p} value={p}>{p}</option>)}
          </select>
        </div>
      </div>
      <label style={labelSt(th)}>Indirizzo</label>
      <input value={f.address} onChange={e => setF(p => ({...p, address:e.target.value}))} placeholder="Via, civico, città" style={inputSt(th)}/>
      <div style={{fontSize:11,color:th.sub,marginTop:-6,marginBottom:12}}>📍 Le coordinate per il raggio km vengono trovate automaticamente dall'indirizzo.</div>
      <label style={labelSt(th)}>Categorie / tipologia</label>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
        {VENUE_CATEGORIES.map(c => {
          const on = f.categories.includes(c);
          return <button key={c} onClick={() => toggleC(c)} style={{padding:"5px 10px",borderRadius:16,border:`1px solid ${on?th.accent:th.border}`,cursor:"pointer",fontSize:11,fontWeight:600,background:on?th.accent:th.input,color:on?"#fff":th.sub}}>{c}</button>;
        })}
      </div>
      <label style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,fontSize:13,color:th.text,cursor:"pointer"}}>
        <input type="checkbox" checked={f.active} onChange={e => setF(p => ({...p, active:e.target.checked}))}/> Locale attivo
      </label>
      <div style={{display:"flex",gap:8}}>
        <button onClick={onCancel} disabled={busy} style={{...btnSt(th),flex:1}}>Annulla</button>
        <button onClick={submit} disabled={busy} style={{...primBtn(th),flex:1,opacity:busy?0.6:1}}>{geocoding ? "📍 Cerco indirizzo…" : saving ? "Salvataggio…" : "💾 Salva"}</button>
      </div>
      {venue && (confirmDel ? (
        <div style={{marginTop:10,padding:"10px 12px",background:th.danger+"11",borderRadius:10,border:`1px solid ${th.danger}44`}}>
          <div style={{fontSize:12,color:th.text,marginBottom:8}}>Eliminare definitivamente <b>{venue.name}</b> (es. locale chiuso)?</div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={() => setConfirmDel(false)} disabled={busy} style={{...btnSt(th),fontSize:12,flex:1}}>Annulla</button>
            <button onClick={() => onDelete(venue)} disabled={busy} style={{...primBtn(th),fontSize:12,flex:1,background:th.danger}}>Sì, elimina</button>
          </div>
        </div>
      ) : (
        <button onClick={() => setConfirmDel(true)} disabled={busy} style={{...btnSt(th),width:"100%",marginTop:8,fontSize:12,color:th.danger,border:`1px solid ${th.danger}44`,background:"transparent"}}>🗑️ Elimina locale (chiusura)</button>
      ))}
    </div>
  );
}

// ── Scopri: scansione eventi dai profili Instagram dei locali ──
// Flusso a due fasi sulle Edge Function (DB dev):
//  1) instagram-scan  → avvia la raccolta Bright Data sui locali selezionati
//                       e registra una "run";
//  2) instagram-results → interrogata in polling finché lo snapshot è pronto;
//                       estrae gli eventi, li deduplica e li inserisce in
//                       pre-approvazione (compaiono nel tab "Approva").
function DiscoverySection({ th, showToast }) {
  const [cfg, setCfg]         = useState({ from:datePlusDays(0), to:datePlusDays(2), postsPerVenue:8 });
  const [mode, setMode]       = useState("provincia");   // "provincia" | "avanzata"
  const [province, setProvince] = useState("Pescara");
  const [advCity, setAdvCity] = useState("Pescara");
  const [advKm, setAdvKm]     = useState("");
  const [venues, setVenues]   = useState([]);
  const [sel, setSel]         = useState(() => new Set());
  const [filter, setFilter]   = useState("");
  const [loading, setLoading] = useState(true);
  const [running, setRunning] = useState(false);
  const [phase, setPhase]     = useState("");
  const [result, setResult]   = useState(null);
  const [editor, setEditor]   = useState(null);          // null | {venue:null|obj}
  const [savingVenue, setSavingVenue] = useState(false);
  const [savedSearches, setSavedSearches] = useState([]);  // [{name, venueIds}]
  const [saveSearchName, setSaveSearchName] = useState("");
  const [showSaveSearch, setShowSaveSearch] = useState(false);
  const cancelRef = React.useRef(false);

  const loadVenues = async () => {
    const { data: vs } = await sb.from("venues").select("*").order("name");
    setVenues(vs || []);
    return vs || [];
  };

  const wait = ms => new Promise(r => setTimeout(r, ms));

  // Polla instagram-results finché done/error (o finché si lascia la pagina).
  // Anche se l'utente esce, un job lato server (pg_cron) porta avanti la
  // scansione: gli eventi compaiono comunque nel tab Approva. Il lock
  // "processing" lato funzione evita che poll sovrapposti rielaborino (e
  // raddoppino i crediti). Ritorna true se la scansione è conclusa.
  const pollRun = async (runId, headers) => {
    for (let i = 0; i < 60 && !cancelRef.current; i++) {
      const r = await fetch(`${SUPABASE_URL}/functions/v1/instagram-results`, { method:"POST", headers, body: JSON.stringify({ runId }) });
      const out = await r.json();
      if (!r.ok || out.error) throw new Error(out.error || `Errore risultati (${r.status})`);
      if (out.status === "done")  { setResult(out); setPhase(""); showToast(`✅ Scansione completata: ${out.created} eventi`); return true; }
      if (out.status === "error") throw new Error(out.error || "La raccolta è terminata con errore.");
      setPhase("Scansione in corso… gli eventi compariranno nel tab Approva anche se chiudi o cambi pagina.");
      await wait(12000);
    }
    return false;
  };

  useEffect(() => {
    let alive = true;
    cancelRef.current = false;
    (async () => {
      const [{ data: vs }, { data: conf }, { data: ss }, { data: active }] = await Promise.all([
        sb.from("venues").select("*").order("name"),
        sb.from("app_config").select("value").eq("key","discovery_config").maybeSingle(),
        sb.from("app_config").select("value").eq("key","saved_searches").maybeSingle(),
        sb.from("discovery_runs").select("id,status").in("status",["running","processing"]).order("created_at",{ascending:false}).limit(1).maybeSingle(),
      ]);
      if (!alive) return;
      setVenues(vs || []);
      if (conf?.value) {
        const c = conf.value;
        // Il periodo parte SEMPRE da oggi (non si recupera dalla config salvata).
        setCfg(p => ({ ...p, postsPerVenue:c.postsPerVenue||8 }));
        if (c.mode) setMode(c.mode);
        if (c.province) setProvince(c.province);
        if (c.advCity) setAdvCity(c.advCity);
        if (c.advKm) setAdvKm(String(c.advKm));
      }
      if (ss?.value && Array.isArray(ss.value)) setSavedSearches(ss.value);
      setLoading(false);

      // Riprendi una scansione ancora in corso (lanciata prima e non conclusa):
      // il job lato server la sta portando avanti, qui ne mostriamo lo stato.
      if (active) {
        setRunning(true);
        setPhase("Scansione in corso ripresa… gli eventi compariranno nel tab Approva.");
        try {
          const { data:{ session } } = await sb.auth.getSession();
          const headers = { "Content-Type":"application/json", "Authorization":`Bearer ${session.access_token}` };
          await pollRun(active.id, headers);
        } catch (e) {
          if (alive) { setResult({ error: e.message }); setPhase(""); }
        } finally {
          if (alive) setRunning(false);
        }
      }
    })();
    return () => { alive = false; cancelRef.current = true; };
  }, []);

  // Mappa città → coordinate (primo locale per città), per il raggio km
  const cityCoords = useMemo(() => {
    const m = {};
    for (const v of venues) if (v.city && v.lat!=null && v.lon!=null && !m[v.city]) m[v.city] = { lat:v.lat, lon:v.lon };
    return m;
  }, [venues]);
  const venueCities = useMemo(() => [...new Set(venues.map(v => v.city).filter(Boolean))].sort(), [venues]);

  // Locali disponibili in base alla modalità (+ filtro testo)
  const available = useMemo(() => {
    let list;
    if (mode === "provincia") {
      list = venues.filter(v => v.province === province);
    } else {
      const km = Number(advKm), center = cityCoords[advCity];
      list = (!km || !center) ? [] : venues.filter(v => v.lat!=null && v.lon!=null && kmBetween(center, {lat:v.lat, lon:v.lon}) <= km);
    }
    const q = filter.trim().toLowerCase();
    if (q) list = list.filter(v => (v.name||"").toLowerCase().includes(q) || (v.city||"").toLowerCase().includes(q));
    return list;
  }, [venues, mode, province, advKm, advCity, filter, cityCoords]);

  const center = cityCoords[advCity];
  const venueWarn = v => /inesistente|privato|non trovato|verificare|mercury disco/i.test(v.notes || "");
  const toggleVenue = id => setSel(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const selectShown = () => setSel(s => { const n = new Set(s); available.forEach(v => n.add(v.id)); return n; });
  const clearSel    = () => setSel(new Set());

  const addDays = (dateStr, n) => {
    if (!dateStr) return "";
    const d = new Date(dateStr + "T12:00:00");
    d.setDate(d.getDate() + n);
    return d.toISOString().slice(0, 10);
  };

  const persistSavedSearches = async (list) => {
    setSavedSearches(list);
    await sb.from("app_config").upsert({ key:"saved_searches", value:list, updated_at:new Date().toISOString() });
  };

  const saveSearch = async () => {
    const name = saveSearchName.trim();
    if (!name) return showToast("Inserisci un nome per la ricerca.");
    if (!sel.size) return showToast("Seleziona almeno un locale.");
    const updated = [...savedSearches.filter(s => s.name !== name), { name, venueIds:[...sel] }];
    await persistSavedSearches(updated);
    setSaveSearchName(""); setShowSaveSearch(false);
    showToast("✅ Ricerca salvata: " + name);
  };

  const loadSearch = (s) => {
    setSel(new Set(s.venueIds));
    showToast(`📋 Caricata: ${s.name}`);
  };

  const deleteSearch = async (name) => {
    await persistSavedSearches(savedSearches.filter(s => s.name !== name));
    showToast("🗑️ Ricerca eliminata");
  };

  const saveVenue = async (row, errMsg) => {
    if (!row) return showToast("❌ " + (errMsg || "Dati non validi"));
    setSavingVenue(true);
    try {
      if (editor?.venue) {
        const { error } = await sb.from("venues").update(row).eq("id", editor.venue.id);
        if (error) throw error;
      } else {
        const { error } = await sb.from("venues").insert(row);
        if (error) throw error;
      }
      await loadVenues();
      showToast(editor?.venue ? "✅ Locale aggiornato" : "✅ Locale aggiunto");
      setEditor(null);
    } catch (e) {
      showToast("❌ " + (e.message || "Errore salvataggio"));
    } finally {
      setSavingVenue(false);
    }
  };

  const deleteVenue = async (v) => {
    setSavingVenue(true);
    try {
      const { error } = await sb.from("venues").delete().eq("id", v.id);
      if (error) throw error;
      setSel(s => { const n = new Set(s); n.delete(v.id); return n; });
      await loadVenues();
      showToast("🗑️ Locale eliminato");
      setEditor(null);
    } catch (e) {
      showToast("❌ " + (e.message || "Errore eliminazione"));
    } finally {
      setSavingVenue(false);
    }
  };

  const start = async () => {
    if (!sel.size)            return showToast("Seleziona almeno un locale.");
    if (!cfg.from || !cfg.to) return showToast("Imposta il periodo (da / a).");
    const scanCity = mode === "provincia" ? province : advCity;
    const scanKm   = mode === "provincia" ? 60 : (Number(advKm) || 30);
    setRunning(true); setResult(null); setPhase("Avvio scansione…"); cancelRef.current = false;
    try {
      const { data:{ session } } = await sb.auth.getSession();
      const headers = { "Content-Type":"application/json", "Authorization":`Bearer ${session.access_token}` };
      await sb.from("app_config").upsert({ key:"discovery_config", value:{ mode, province, advCity, advKm:Number(advKm)||null, from:cfg.from, to:cfg.to, postsPerVenue:Number(cfg.postsPerVenue)||8 }, updated_at:new Date().toISOString() });
      const scanRes = await fetch(`${SUPABASE_URL}/functions/v1/instagram-scan`, {
        method:"POST", headers,
        body: JSON.stringify({ venueIds:[...sel], postsPerVenue:Number(cfg.postsPerVenue)||8, city:scanCity, km:scanKm, from:cfg.from, to:cfg.to, categories:[] }),
      });
      const scan = await scanRes.json();
      if (!scanRes.ok || scan.error) throw new Error(scan.error || `Errore avvio (${scanRes.status})`);
      setPhase(`Raccolta avviata su ${scan.venues} locali. Attendo i risultati… (può richiedere qualche minuto)`);
      // La scansione prosegue lato server (pg_cron) anche se chiudi o cambi
      // pagina: qui pollo solo per mostrare l'avanzamento. Riaprendo il tab
      // Scopri la scansione in corso viene ripresa automaticamente.
      const done = await pollRun(scan.runId, headers);
      if (!done && !cancelRef.current) setPhase("⏳ La raccolta sta ancora elaborando: riapri tra poco e ricontrolla il tab Approva.");
    } catch (e) {
      setResult({ error: e.message }); setPhase("");
      showToast("❌ " + e.message);
    } finally {
      setRunning(false);
    }
  };

  if (loading) return <div style={{color:th.sub,textAlign:"center",padding:20}}>Caricamento locali…</div>;

  const modeBtn = (m, label) => (
    <button onClick={() => setMode(m)} style={{flex:1,padding:"8px 10px",borderRadius:10,border:`1px solid ${mode===m?th.accent:th.border}`,cursor:"pointer",fontSize:12,fontWeight:600,background:mode===m?th.accent:th.input,color:mode===m?"#fff":th.sub}}>{label}</button>
  );

  return (
    <div>
      <div style={{...cardSt(th),marginBottom:14}}>
        <div style={sectTitle(th)}>🔍 Parametri di ricerca</div>

        <label style={labelSt(th)}>Periodo evento</label>
        <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
          <input type="date" min={datePlusDays(0)} value={cfg.from} onChange={e => { const f=e.target.value; setCfg(p => ({...p, from:f, to:addDays(f,2)})); }} style={{...inputSt(th),marginBottom:0,flex:1}}/>
          <span style={{color:th.sub,fontSize:13}}>→</span>
          <input type="date" value={cfg.to} onChange={e => setCfg(p => ({...p, to:e.target.value}))} style={{...inputSt(th),marginBottom:0,flex:1}}/>
        </div>

        <label style={labelSt(th)}>Post da leggere per locale</label>
        <input type="number" min="1" max="50" value={cfg.postsPerVenue} onChange={e => setCfg(p => ({...p, postsPerVenue:e.target.value}))} style={inputSt(th)}/>

        <label style={labelSt(th)}>Come selezionare i locali</label>
        <div style={{display:"flex",gap:6,marginBottom:12}}>
          {modeBtn("provincia","📍 Per provincia")}
          {modeBtn("avanzata","🎯 Ricerca avanzata (raggio km)")}
        </div>

        {mode === "provincia" ? (
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {ABRUZZO_PROVINCES.map(p => {
              const on = province === p;
              const n = venues.filter(v => v.province === p).length;
              return <button key={p} onClick={() => setProvince(p)} style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${on?th.accent:th.border}`,cursor:"pointer",fontSize:12,fontWeight:600,background:on?th.accent:th.input,color:on?"#fff":th.sub}}>{p} ({n})</button>;
            })}
          </div>
        ) : (
          <div>
            <div style={{display:"flex",gap:8}}>
              <div style={{flex:2}}>
                <label style={labelSt(th)}>Città di riferimento</label>
                <select value={advCity} onChange={e => setAdvCity(e.target.value)} style={inputSt(th)}>
                  {venueCities.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>
              <div style={{flex:1}}>
                <label style={labelSt(th)}>Raggio (km)</label>
                <input type="number" min="1" max="300" value={advKm} onChange={e => setAdvKm(e.target.value)} placeholder="es. 25" style={inputSt(th)}/>
              </div>
            </div>
            <div style={{fontSize:11,color:th.sub}}>{!Number(advKm) ? "Inserisci i km: i locali nel raggio appariranno qui sotto." : `${available.length} locali entro ${advKm} km da ${advCity}.`}</div>
          </div>
        )}
      </div>

      <div style={{...cardSt(th),marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,gap:8}}>
          <div style={sectTitle(th)}>🏟️ Locali da scansionare ({sel.size} selez. · {available.length} disp.)</div>
          <button onClick={() => setEditor({ venue:null })} style={{...btnSt(th),fontSize:12,whiteSpace:"nowrap"}}>➕ Aggiungi</button>
        </div>

        {editor && <VenueEditor th={th} venue={editor.venue} onSave={saveVenue} onDelete={deleteVenue} onCancel={() => setEditor(null)} saving={savingVenue}/>}

        {savedSearches.length > 0 && (
          <div style={{marginBottom:10}}>
            <div style={{fontSize:11,color:th.sub,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,marginBottom:6}}>Ricerche salvate</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {savedSearches.map(s => (
                <div key={s.name} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:20,border:`1px solid ${th.border}`,background:th.input,fontSize:12}}>
                  <button onClick={() => loadSearch(s)} style={{background:"none",border:"none",cursor:"pointer",color:th.accent,fontWeight:600,padding:0,fontSize:12}}>{s.name} ({s.venueIds.length})</button>
                  <button onClick={() => deleteSearch(s.name)} style={{background:"none",border:"none",cursor:"pointer",color:th.sub,padding:0,fontSize:13,lineHeight:1}}>✕</button>
                </div>
              ))}
            </div>
          </div>
        )}

        {sel.size > 0 && (
          <div style={{marginBottom:10,padding:"8px 12px",borderRadius:10,background:th.accent+"12",border:`1px solid ${th.accent}33`}}>
            <div style={{fontSize:12,color:th.text,marginBottom:6,fontWeight:600}}>✓ {sel.size} locali selezionati:</div>
            <div style={{fontSize:11,color:th.sub,marginBottom:8,lineHeight:1.6}}>
              {venues.filter(v => sel.has(v.id)).map(v => v.name).join(" · ")}
            </div>
            {!showSaveSearch
              ? <button onClick={() => setShowSaveSearch(true)} style={{...btnSt(th),fontSize:12,padding:"4px 12px"}}>💾 Salva questa ricerca</button>
              : (
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <input value={saveSearchName} onChange={e => setSaveSearchName(e.target.value)} placeholder="Nome ricerca…" style={{...inputSt(th),marginBottom:0,flex:1,fontSize:12,padding:"6px 10px"}} onKeyDown={e => { if(e.key==="Enter") saveSearch(); }}/>
                  <button onClick={saveSearch} style={{...primBtn(th),fontSize:12,padding:"6px 12px",whiteSpace:"nowrap"}}>Salva</button>
                  <button onClick={() => { setShowSaveSearch(false); setSaveSearchName(""); }} style={{...btnSt(th),fontSize:12,padding:"6px 10px"}}>✕</button>
                </div>
              )
            }
          </div>
        )}

        <input value={filter} onChange={e => setFilter(e.target.value)} placeholder="Filtra per nome o città…" style={inputSt(th)}/>
        <div style={{display:"flex",gap:6,marginBottom:10}}>
          <button onClick={selectShown} style={{...btnSt(th),fontSize:12,flex:1}}>✓ Seleziona visibili ({available.length})</button>
          <button onClick={clearSel} style={{...btnSt(th),fontSize:12,flex:1}}>✕ Deseleziona tutti</button>
        </div>
        <div style={{maxHeight:300,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
          {available.map(v => {
            const on = sel.has(v.id);
            const dist = (mode==="avanzata" && center && v.lat!=null && v.lon!=null) ? Math.round(kmBetween(center,{lat:v.lat,lon:v.lon})) : null;
            return (
              <div key={v.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:10,border:`1px solid ${on?th.accent:th.border}`,background:on?th.accent+"18":th.input}}>
                <div onClick={() => toggleVenue(v.id)} style={{flex:1,minWidth:0,display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
                  <div style={{width:20,height:20,borderRadius:6,flexShrink:0,border:`2px solid ${on?th.accent:th.sub}`,background:on?th.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13}}>{on?"✓":""}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:th.text}}>{v.name} {venueWarn(v) && <span title={v.notes||""}>⚠️</span>}</div>
                    <div style={{fontSize:11,color:th.sub,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{v.city||"—"}{v.province?` (${v.province})`:""} · @{igHandleOf(v.instagram_url)}{dist!=null?` · ${dist} km`:""}</div>
                  </div>
                </div>
                <button onClick={() => setEditor({ venue:v })} title="Modifica locale" style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:th.sub,padding:"2px 4px",flexShrink:0}}>✏️</button>
              </div>
            );
          })}
          {available.length===0 && <div style={{color:th.sub,fontSize:13,textAlign:"center",padding:14}}>{mode==="avanzata" && !Number(advKm) ? "Imposta i km per vedere i locali disponibili." : "Nessun locale disponibile con questi criteri."}</div>}
        </div>
      </div>

      <button onClick={start} disabled={running} style={{...primBtn(th),width:"100%",fontSize:14,padding:"12px 16px",opacity:running?0.6:1,cursor:running?"default":"pointer"}}>
        {running ? "⏳ Scansione in corso…" : `🔍 Avvia scansione (${sel.size} locali)`}
      </button>

      {phase && <div style={{marginTop:12,padding:"10px 12px",borderRadius:10,background:th.input,color:th.sub,fontSize:13}}>{phase}</div>}
      {result && !result.error && (
        <div style={{marginTop:12,padding:"12px 14px",borderRadius:10,background:th.ok+"1A",border:`1px solid ${th.ok}55`,color:th.text,fontSize:13}}>
          ✅ Creati <b>{result.created}</b> nuovi eventi{typeof result.scartati==="number" && ` · ${result.scartati} doppioni scartati`}{typeof result.flyers==="number" && ` · ${result.flyers} locandine`}.<br/>
          Vai sul tab <b>✅ Approva</b> per rivederli e pubblicarli.
        </div>
      )}
      {result?.error && (
        <div style={{marginTop:12,padding:"12px 14px",borderRadius:10,background:th.danger+"1A",border:`1px solid ${th.danger}55`,color:th.text,fontSize:13}}>❌ {result.error}</div>
      )}
    </div>
  );
}

function AdminView({ th, user, onBack, showToast, pendingEvents, onPublish, onEditEvent, onDeleteEvent, trashRefresh, initialSection, onSection }) {
  const [users,   setUsers]  = useState([]);
  const [logs,    setLogs]   = useState([]);
  const [trash,   setTrash]  = useState([]);
  const [section, setSectionState]= useState(initialSection || "users");
  const setSection = s => { setSectionState(s); onSection && onSection(s); };
  const [loading, setLoading]= useState(true);
  const [confirmDelete, setConfirmDelete] = useState(null);

  useEffect(() => {
    const load = async () => {
      const cutoff = new Date(Date.now() - 30*24*60*60*1000).toISOString();
      const [u, l, t] = await Promise.all([
        sb.from("profiles").select("*").order("created_at"),
        sb.from("activity_log").select("*").gte("created_at", cutoff).order("created_at",{ascending:false}).limit(200),
        sb.from("events").select("*").not("deleted_at","is",null).order("deleted_at",{ascending:false}),
      ]);
      await sb.from("activity_log").delete().lt("created_at", cutoff);
      setUsers(u.data||[]); setLogs(l.data||[]); setTrash(t.data||[]);
      setLoading(false);
    };
    load();
  }, [trashRefresh]);

  const nameFor = (l) => {
    const u = users.find(x => x.id === l.user_id);
    return u?.full_name || l.user_email || "Utente";
  };

  const toggleRole = async (id, role) => {
    const newRole = role === "admin" ? "user" : "admin";
    await sb.from("profiles").update({ role: newRole }).eq("id", id);
    setUsers(p => p.map(u => u.id===id ? {...u, role:newRole} : u));
    showToast("✅ Ruolo aggiornato");
  };

  const toggleBlock = async (id, blocked) => {
    await sb.from("profiles").update({ blocked: !blocked }).eq("id", id);
    setUsers(p => p.map(u => u.id===id ? {...u, blocked:!blocked} : u));
    showToast(!blocked ? "🚫 Utente bloccato" : "✅ Utente sbloccato");
  };

  const deleteUser = async u => {
    const { data:{ session } } = await sb.auth.getSession();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/delete-user`, {
      method: "POST",
      headers: { "Content-Type":"application/json", "Authorization":`Bearer ${session.access_token}` },
      body: JSON.stringify({ userId: u.id, voterName: u.full_name || u.email }),
    });
    const result = await res.json();
    if (!res.ok || result.error) { showToast("❌ " + (result.error || "Errore")); return; }
    setUsers(p => p.filter(x => x.id !== u.id));
    setConfirmDelete(null);
    showToast("🗑️ Utente eliminato");
  };

  const restoreEvent = async id => {
    await sb.from("events").update({ deleted_at: null }).eq("id", id);
    setTrash(p => p.filter(e => e.id !== id));
    showToast("✅ Evento ripristinato!");
  };

  const permanentDelete = async id => {
    await sb.from("events").delete().eq("id", id);
    setTrash(p => p.filter(e => e.id !== id));
    showToast("🗑️ Evento eliminato definitivamente");
  };

  const tabs = [["users","👥 Utenti"],["discover","🔍 Scopri"],["approve","✅ Approva"],["logs","📋 Attività"],["trash","🗑️ Cestino"]];

  return (
    <div>
      <button onClick={onBack} style={backBtn(th)}>← Indietro</button>
      <h2 style={{margin:"0 0 16px",fontSize:18,color:th.text}}>👑 Pannello Admin</h2>
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
        {tabs.map(([s,l]) => (
          <button key={s} onClick={() => setSection(s)}
            style={{padding:"7px 12px",borderRadius:10,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,
              background:section===s?th.accent:th.input,color:section===s?"#fff":th.sub}}>
            {l}{s==="users" && users.length>0 && ` (${users.length})`}{s==="trash" && trash.length>0 && ` (${trash.length})`}{s==="approve" && pendingEvents.length>0 && ` (${pendingEvents.length})`}
          </button>
        ))}
      </div>

      {section==="discover" && <DiscoverySection th={th} showToast={showToast}/>}

      {section==="approve" && <ApprovalQueue th={th} pendingEvents={pendingEvents} onPublish={onPublish} onEdit={onEditEvent} onDelete={onDeleteEvent}/>}

      {loading && ["users","logs","trash"].includes(section) && <div style={{color:th.sub,textAlign:"center",padding:20}}>Caricamento...</div>}

      {!loading && section==="users" && users.map(u => (
        <div key={u.id} style={{...cardSt(th),marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <Avatar name={u.full_name||u.email} size={36}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:14,color:th.text}}>{u.full_name||"—"}</div>
              <div style={{fontSize:12,color:th.sub}}>{u.email}</div>
            </div>
            {u.blocked && <span style={{fontSize:11,padding:"2px 8px",borderRadius:8,fontWeight:600,background:th.danger+"22",color:th.danger}}>🚫 Bloccato</span>}
            <span style={{fontSize:11,padding:"2px 8px",borderRadius:8,fontWeight:600,
              background:u.role==="admin"?th.accent+"33":th.ok+"33",
              color:u.role==="admin"?th.accent:th.ok}}>
              {u.role==="admin"?"👑 Admin":"👤 User"}
            </span>
          </div>
          {u.id !== user.id ? (
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              <button onClick={() => toggleRole(u.id, u.role)} style={{...btnSt(th),fontSize:12,width:"100%"}}>
                {u.role==="admin"?"→ Utente":"→ Admin"}
              </button>
              {confirmDelete === u.id ? (
                <div style={{padding:"10px 12px",background:th.danger+"11",borderRadius:10,border:`1px solid ${th.danger}44`}}>
                  <div style={{fontSize:12,color:th.text,marginBottom:8}}>Eliminare <b>{u.full_name||u.email}</b>? Saranno rimossi anche tutti i suoi voti.</div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={() => setConfirmDelete(null)} style={{...btnSt(th),fontSize:12,flex:1}}>Annulla</button>
                    <button onClick={() => deleteUser(u)} style={{...primBtn(th),fontSize:12,flex:1,background:th.danger}}>Sì, elimina</button>
                  </div>
                </div>
              ) : (
                <React.Fragment>
                  <button onClick={() => toggleBlock(u.id, u.blocked)} style={{...btnSt(th),fontSize:12,width:"100%",color:u.blocked?th.ok:th.warn,border:`1px solid ${u.blocked?th.ok:th.warn}44`,background:"transparent"}}>
                    {u.blocked ? "✅ Sblocca utente" : "🚫 Blocca utente"}
                  </button>
                  <button onClick={() => setConfirmDelete(u.id)} style={{...btnSt(th),fontSize:12,width:"100%",color:th.danger,border:`1px solid ${th.danger}44`,background:"transparent"}}>🗑️ Elimina utente</button>
                </React.Fragment>
              )}
            </div>
          ) : (
            <div style={{fontSize:11,color:th.sub,textAlign:"center"}}>Sei tu</div>
          )}
        </div>
      ))}

      {!loading && section==="logs" && (
        logs.length===0
          ? <div style={{color:th.sub,fontSize:14,textAlign:"center",padding:20}}>Nessuna attività registrata.</div>
          : logs.map(l => (
            <div key={l.id} style={{...cardSt(th),marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:13,fontWeight:600,color:th.text}}>{l.action}</span>
                <span style={{fontSize:11,color:th.sub}}>{fmtDate(l.created_at)}</span>
              </div>
              <div style={{fontSize:12,color:th.sub}}>{nameFor(l)} · {l.entity_title}</div>
              {l.details && <div style={{fontSize:11,color:th.sub,marginTop:4,fontStyle:"italic"}}>{l.details}</div>}
            </div>
          ))
      )}

      {!loading && section==="trash" && (
        trash.length===0
          ? <div style={{color:th.sub,fontSize:14,textAlign:"center",padding:20}}>Il cestino è vuoto.</div>
          : trash.map(e => {
            const dLeft = e.deleted_at ? 30 - Math.floor((Date.now()-new Date(e.deleted_at))/(1000*60*60*24)) : 0;
            return (
              <div key={e.id} style={{...cardSt(th),marginBottom:10}}>
                <div style={{fontWeight:600,fontSize:14,color:th.text,marginBottom:4}}>{e.title}</div>
                <div style={{fontSize:12,color:th.sub,marginBottom:8}}>
                  Eliminato il {fmtDate(e.deleted_at)} ·{" "}
                  <span style={{color:dLeft<=3?th.danger:th.warn,fontWeight:600}}>{dLeft}gg rimasti</span>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={() => restoreEvent(e.id)} style={{...primBtn(th),fontSize:12,flex:1}}>↩️ Ripristina</button>
                  <button onClick={() => permanentDelete(e.id)} style={{...btnSt(th),fontSize:12,flex:1,color:th.danger}}>🗑️ Elimina</button>
                </div>
              </div>

          })
      )}
    </div>
  );

// ── Calendar Grid ─────────────────────────────────────────────
function CalGrid({ calDate, setCalDate, events, ferie, th, onDayClick }) {
  const { y, m } = calDate;
  const days  = getDaysInMonth(y, m);
  const first = getFirstDay(y, m);
  const today = new Date();
  const ts    = toDateStr(today.getFullYear(), today.getMonth(), today.getDate());

  const cells = useMemo(() => {
    const arr = [];
    for (let i = 0; i < first; i++) arr.push(null);
    for (let d = 1; d <= days; d++) arr.push(d);
    return arr;
  }, [y, m, first, days]);

  // Mappa giorno → eventi del mese (un evento multi-giorno copre tutto l'intervallo)
  const eventsByDay = useMemo(() => {
    const map = new Map();
    for (let d = 1; d <= days; d++) {
      const ds = toDateStr(y, m, d);
      const evs = events.filter(e => eventCoversDay(e, ds));
      if (evs.length) map.set(ds, evs);
    }
    return map;
  }, [events, y, m, days]);

  // Giorni del mese in cui almeno una persona è in ferie (per la palma 🌴)
  const ferieDays = useMemo(() => {
    const s = new Set();
    for (let d = 1; d <= days; d++) {
      const ds = toDateStr(y, m, d);
      if ((ferie||[]).some(f => f.start_date <= ds && ds <= f.end_date)) s.add(ds);
    }
    return s;
  }, [ferie, y, m, days]);

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <button onClick={() => setCalDate(p => p.m===0 ? {y:p.y-1,m:11} : {y:p.y,m:p.m-1})} style={btnSt(th)}>‹</button>
        <span style={{fontWeight:700,fontSize:16,color:th.text}}>{MONTHS[m]} {y}</span>
        <button onClick={() => setCalDate(p => p.m===11 ? {y:p.y+1,m:0} : {y:p.y,m:p.m+1})} style={btnSt(th)}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
        {DAYS.map(d => <div key={d} style={{textAlign:"center",fontSize:11,color:th.sub,paddingBottom:4}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {cells.map((d, i) => {
          if (!d) return <div key={i}/>;
          const ds  = toDateStr(y, m, d);
          const isT = ds === ts;
          const evs    = eventsByDay.get(ds) || [];
          const spans  = evs.filter(isMultiDay);
          const single = evs.filter(e => !isMultiDay(e));
          const hasF = ferieDays.has(ds);
          const clickable = evs.length || hasF;
          return (
            <div key={i} onClick={() => clickable && onDayClick(ds, evs)}
              style={{borderRadius:10,padding:"6px 2px",textAlign:"center",cursor:clickable?"pointer":"default",
                background:isT?th.accent:"transparent",border:`2px solid ${isT?th.accent:"transparent"}`}}>
              <span style={{fontSize:13,fontWeight:isT?700:400,color:isT?"#fff":th.text}}>{d}</span>
              {spans.slice(0,3).map(e => {
                const c = scColor(STATUS_CONFIG[e.status]||STATUS_CONFIG.open, th);
                const isStart = ds === e.date, isEnd = ds === (e.end_date || e.date);
                return <div key={e.id} title={e.title} style={{height:4,background:c,marginTop:2,
                  marginLeft:isStart?2:-3, marginRight:isEnd?2:-3,
                  borderTopLeftRadius:isStart?3:0, borderBottomLeftRadius:isStart?3:0,
                  borderTopRightRadius:isEnd?3:0, borderBottomRightRadius:isEnd?3:0}}/>;
              })}
              {(single.length>0 || hasF) && (
                <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:2,marginTop:3,flexWrap:"wrap"}}>
                  {single.slice(0,4).map(e => <div key={e.id} style={{width:6,height:6,borderRadius:"50%",background:scColor(STATUS_CONFIG[e.status]||STATUS_CONFIG.open,th)}}/>)}
                  {hasF && <span style={{fontSize:9,lineHeight:1}}>🌴</span>}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}
