<script type="text/babel" data-type="module">

const { useState, useEffect, useCallback, useMemo } = React;

const SUPABASE_URL = "https://divxqcadlishdfhpvixd.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpdnhxY2FkbGlzaGRmaHB2aXhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4ODM4OTQsImV4cCI6MjA5NTQ1OTg5NH0.EqTuOJBLsrSIA1vK3eNP4YZnzR6_GxqO_TsEKaEfxYg";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Palette ───────────────────────────────────────────────────
// Chiaro: pesca + cielo
// Scuro:  blu notte profondo
const LIGHT = {
  bg:      "#FDF6F0",       // pesca chiarissimo
  card:    "#FFFFFF",
  border:  "#F2E4D8",       // pesca tenue
  text:    "#3A2E28",       // marrone caldo scuro

  input:   "#FBF0E8",       // pesca pallido
  accent:  "#7EB8D4",       // cielo pastello
  accent2: "#F4A97A",       // pesca medio (bottoni secondari)
  ok:      "#85C9A8",       // menta pastello

const DARK = {

  card:    "#152535",       // blu notte card
  border:  "#1E3448",       // blu notte bordo

  accent:  "#7EB8D4",       // cielo pastello (stesso del chiaro)
  accent2: "#F4A97A",       // pesca (stesso del chiaro)

  warn:    "#F6C97A",       // giallo pastello
  danger:  "#E8907A",       // corallo pastello
};

const STATUS_CONFIG = {
  open:    { label: "Prenotabile",    colorKey: "ok"     },
  pending: { label: "In valutazione", colorKey: "warn"   },
  full:    { label: "Al completo",    colorKey: "danger" },
};
const scColor = (sc, th) => th[sc.colorKey] || th.accent;

const UNITS  = ["pz","kg","g","L","cl","ml"];
const MONTHS = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
const DAYS   = ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
const AVATAR_COLORS = ["#7EB8D4","#85C9A8","#F6C97A","#E8907A","#A8C4D4","#F4A97A"];

// ── Helpers ───────────────────────────────────────────────────
const getDaysInMonth = (y, m) => new Date(y, m + 1, 0).getDate();
const getFirstDay    = (y, m) => new Date(y, m, 1).getDay();
const toDateStr      = (y, m, d) => `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
const openMaps       = addr => window.open("https://maps.google.com/?q=" + encodeURIComponent(addr), "_blank");

const daysUntil = deadline => {
  if (!deadline) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  const d = new Date(deadline); d.setHours(0,0,0,0);
  return Math.round((d - t) / 86400000);
};

const eventBadge = (date, th, dark) => {
  if (!date) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  const d = new Date(date + "T00:00:00"); d.setHours(0,0,0,0);
  const diff = Math.round((d - t) / 86400000);
  if (diff === 0) return { label: "🔔 Oggi",   bg: th.danger,               color: "#fff" };
  if (diff === 1) return { label: "📅 Domani", bg: th.ok, color: "#fff" };
  return null;
};

const validatePassword = p => {
  if (p.length < 8)             return "Min. 8 caratteri.";
  if (!/[A-Z]/.test(p))         return "Serve almeno una maiuscola.";
  if (!/[a-z]/.test(p))         return "Serve almeno una minuscola.";
  if (!/[0-9]/.test(p))         return "Serve almeno un numero.";
  if (!/[^a-zA-Z0-9]/.test(p)) return "Serve almeno un carattere speciale.";
  return null;
};

// ── Style helpers ─────────────────────────────────────────────
const cardSt    = th => ({ background: th.card, borderRadius: 14, padding: 14, border: `1px solid ${th.border}` });
const inputSt   = th => ({ width: "100%", background: th.input, border: `1px solid ${th.border}`, borderRadius: 10, padding: "10px 12px", fontSize: 16, color: th.text, marginBottom: 12, outline: "none" });
const labelSt   = th => ({ display: "block", fontSize: 12, color: th.sub, marginBottom: 4, fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase" });
const btnSt     = th => ({ background: th.input, border: `1px solid ${th.border}`, borderRadius: 10, padding: "8px 14px", cursor: "pointer", fontSize: 13, color: th.text });
const primBtn   = th => ({ background: th.accent, border: "none", borderRadius: 10, padding: "10px 16px", cursor: "pointer", fontSize: 13, color: "#fff", fontWeight: 600 });
const backBtn   = th => ({ background: th.accent, border: "none", borderRadius: 12, padding: "10px 20px", cursor: "pointer", fontSize: 14, color: "#fff", fontWeight: 700, display: "inline-flex", alignItems: "center", gap: 6, marginBottom: 18, boxShadow: `0 2px 8px ${th.accent}44` });
const dangerBtn = th => ({ width: "100%", padding: "10px 16px", borderRadius: 10, cursor: "pointer", fontSize: 13, fontWeight: 600, color: "#fff", border: "none", background: th.danger });

// ── Shared UI ─────────────────────────────────────────────────
function DeadlineBadge({ deadline, th }) {
  const d = daysUntil(deadline);
  if (d === null) return null;
  if (d < 0)  return <span style={{background:th.border,color:th.sub,borderRadius:8,padding:"2px 8px",fontSize:11,fontWeight:600}}>⏰ Scaduto</span>;
  if (d === 0) return <span style={{background:th.danger+"33",color:th.danger,borderRadius:8,padding:"2px 8px",fontSize:11,fontWeight:600}}>🔴 Scade oggi!</span>;
  if (d <= 3)  return <span style={{background:th.warn+"33",color:th.warn,borderRadius:8,padding:"2px 8px",fontSize:11,fontWeight:600}}>⚠️ Scade tra {d}gg</span>;
  return null;
}

function Avatar({ name, size = 32 }) {
  const initials = (name || "?").split(" ").map(w => w[0]).slice(0, 2).join("").toUpperCase();
  const color = AVATAR_COLORS[(name || "").charCodeAt(0) % AVATAR_COLORS.length];
  return (
    <div style={{width:size,height:size,borderRadius:"50%",background:color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.38,fontWeight:700,color:"#fff",flexShrink:0}}>
      {initials}
    </div>
  );
}

function Toggle({ value, onChange, th }) {
  return (
    <div onClick={onChange} style={{width:42,height:24,borderRadius:12,background:value?th.accent:th.border,cursor:"pointer",position:"relative",transition:"background .2s",flexShrink:0}}>
      <div style={{position:"absolute",top:3,left:value?20:3,width:18,height:18,borderRadius:"50%",background:"#fff",transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.15)"}}/>
    </div>
  );
}

function ItemRow({ item, th, onToggle, onDelete }) {
  const [confirm, setConfirm] = useState(false);
  return (
    <div style={{...cardSt(th), marginBottom: 8}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div onClick={() => onToggle(item.id)} style={{width:22,height:22,borderRadius:6,flexShrink:0,cursor:"pointer",border:`2px solid ${item.done?th.ok:th.accent}`,background:item.done?th.ok:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
          {item.done && <span style={{color:"#fff",fontSize:13,fontWeight:700}}>✓</span>}
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:600,color:item.done?th.sub:th.text,textDecoration:item.done?"line-through":"none"}}>{item.name}</div>
          <div style={{fontSize:12,color:th.sub,marginTop:2}}>
            {item.qty && `${item.qty} ${item.unit}`}{item.qty && item.assignee && " · "}{item.assignee && `👤 ${item.assignee}`}
          </div>
        </div>
        <button onClick={() => setConfirm(true)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:th.sub,padding:"4px"}}>✕</button>
      </div>
      {confirm && (
        <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${th.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <span style={{fontSize:12,color:th.text}}>Eliminare <b>{item.name}</b>?</span>
          <div style={{display:"flex",gap:6}}>
            <button onClick={() => setConfirm(false)} style={{...btnSt(th),fontSize:12,padding:"4px 10px"}}>Annulla</button>
            <button onClick={() => onDelete(item.id)} style={{...primBtn(th),fontSize:12,padding:"4px 10px",background:th.danger}}>Elimina</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Password Recovery ─────────────────────────────────────────
function PasswordRecoveryView({ th, onDone }) {
  const [f, setF]       = useState({ new1: "", new2: "", err: "", ok: false });
  const [loading, setL] = useState(false);

  const save = async () => {
    const err = validatePassword(f.new1);
    if (err) return setF(p => ({...p, err}));
    if (f.new1 !== f.new2) return setF(p => ({...p, err: "Le password non coincidono."}));
    setL(true);
    const { error } = await sb.auth.updateUser({ password: f.new1 });
    setL(false);
    if (error) return setF(p => ({...p, err: error.message}));
    setF(p => ({...p, ok: true, err: ""}));
    setTimeout(onDone, 2000);
  };

  return (
    <div style={{minHeight:"100vh",background:th.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:40,marginBottom:8}}>🔑</div>
          <h1 style={{fontSize:22,fontWeight:700,color:th.text}}>Nuova password</h1>
          <p style={{fontSize:13,color:th.sub,marginTop:4}}>Scegli una nuova password per il tuo account.</p>
        </div>
        <div style={cardSt(th)}>
          <label style={labelSt(th)}>Nuova password</label>
          <input type="password" value={f.new1} onChange={e => setF(p => ({...p, new1: e.target.value}))} placeholder="Es. Ciao123!" style={inputSt(th)}/>
          <label style={labelSt(th)}>Conferma password</label>
          <input type="password" value={f.new2} onChange={e => setF(p => ({...p, new2: e.target.value}))} placeholder="Ripeti la password" style={inputSt(th)}/>
          {f.err && <div style={{color:th.danger,fontSize:13,marginBottom:12}}>{f.err}</div>}
          {f.ok  && <div style={{color:th.ok,fontSize:13,marginBottom:12}}>✅ Password aggiornata! Reindirizzamento...</div>}
          <button onClick={save} disabled={loading} style={{...primBtn(th),width:"100%",opacity:loading?.6:1}}>
            {loading ? "Salvataggio..." : "Salva nuova password"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Login ─────────────────────────────────────────────────────
function LoginView({ th, onGoRegister, onRecovery }) {
  const [email, setEmail]   = useState("");
  const [pass,  setPass]    = useState("");
  const [err,   setErr]     = useState("");
  const [loading, setL]     = useState(false);
  const [step,  setStep]    = useState("login");
  const [resetEmail, setRE] = useState("");
  const [otp,   setOtp]     = useState("");

  const login = async () => {
    setErr(""); setL(true);
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    setL(false);
    if (!error) return;
    if (error.message.toLowerCase().includes("email not confirmed"))
      setErr("📧 Devi confermare la tua email prima di accedere.");
    else if (error.message.toLowerCase().includes("invalid login"))
      setErr("Email o password errati.");
    else setErr(error.message);
  };

  const sendOtp = async () => {
    if (!resetEmail.trim()) return setErr("Inserisci la tua email.");
    setErr(""); setL(true);
    const { error } = await sb.auth.resetPasswordForEmail(resetEmail.trim());
    setL(false);
    if (error) return setErr(error.message);
    setStep("forgot_otp");
  };

  const verifyOtp = async () => {
    if (otp.trim().length < 8) return setErr("Inserisci il codice a 8 cifre.");
    setErr(""); setL(true);
    const { data, error } = await sb.auth.verifyOtp({ email: resetEmail.trim(), token: otp.trim(), type: "recovery" });
    setL(false);
    if (error) return setErr("Codice non valido o scaduto. Riprova.");
    if (data?.session) onRecovery(data.session.user);
  };

  const back = () => { setStep("login"); setErr(""); setOtp(""); };

  if (step === "forgot_email") return (
    <div style={{minHeight:"100vh",background:th.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:40,marginBottom:8}}>🔑</div>
          <h1 style={{fontSize:22,fontWeight:700,color:th.text}}>Reset password</h1>
          <p style={{fontSize:13,color:th.sub,marginTop:4}}>Riceverai un codice a 8 cifre via email.</p>
        </div>
        <div style={cardSt(th)}>
          <label style={labelSt(th)}>La tua email</label>
          <input type="email" value={resetEmail} onChange={e => setRE(e.target.value)} placeholder="la-tua@email.com" style={inputSt(th)} onKeyDown={e => e.key==="Enter" && sendOtp()}/>
          {err && <div style={{color:th.danger,fontSize:13,marginBottom:12}}>{err}</div>}
          <button onClick={sendOtp} disabled={loading} style={{...primBtn(th),width:"100%",opacity:loading?.6:1}}>{loading ? "Invio..." : "Invia codice"}</button>
        </div>
        <div style={{textAlign:"center",marginTop:16}}>
          <button onClick={back} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:th.accent,fontWeight:600}}>← Torna al login</button>
        </div>
      </div>
    </div>
  );

  if (step === "forgot_otp") return (
    <div style={{minHeight:"100vh",background:th.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:40,marginBottom:8}}>📧</div>
          <h1 style={{fontSize:22,fontWeight:700,color:th.text}}>Controlla la tua email</h1>
          <p style={{fontSize:13,color:th.sub,marginTop:4}}>Inserisci il codice a 8 cifre ricevuto su <b>{resetEmail}</b></p>
        </div>
        <div style={cardSt(th)}>
          <label style={labelSt(th)}>Codice di verifica</label>
          <input value={otp} onChange={e => setOtp(e.target.value.replace(/\D/g,""))} placeholder="12345678" maxLength={8}
            style={{...inputSt(th),letterSpacing:8,fontSize:22,textAlign:"center"}} onKeyDown={e => e.key==="Enter" && verifyOtp()}/>
          {err && <div style={{color:th.danger,fontSize:13,marginBottom:12}}>{err}</div>}
          <button onClick={verifyOtp} disabled={loading} style={{...primBtn(th),width:"100%",opacity:loading?.6:1}}>{loading ? "Verifica..." : "Verifica codice"}</button>
          <button onClick={sendOtp} disabled={loading} style={{...btnSt(th),width:"100%",marginTop:8,fontSize:12}}>Non hai ricevuto il codice? Invia di nuovo</button>
        </div>
        <div style={{textAlign:"center",marginTop:16}}>
          <button onClick={back} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:th.accent,fontWeight:600}}>← Torna al login</button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:th.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:40,marginBottom:8}}>📅</div>
          <h1 style={{fontSize:26,fontWeight:700,color:th.text}}>Bacheca</h1>
          <p style={{fontSize:14,color:th.sub,marginTop:4}}>Accedi per continuare</p>
        </div>
        <div style={cardSt(th)}>
          <label style={labelSt(th)}>Email</label>
          <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="la-tua@email.com" style={inputSt(th)}/>
          <label style={labelSt(th)}>Password</label>
          <input type="password" value={pass} onChange={e => setPass(e.target.value)} placeholder="••••••••" style={inputSt(th)} onKeyDown={e => e.key==="Enter" && login()}/>
          {err && <div style={{color:th.danger,fontSize:13,marginBottom:12}}>{err}</div>}
          <button onClick={login} disabled={loading} style={{...primBtn(th),width:"100%",opacity:loading?.6:1}}>{loading ? "Accesso in corso..." : "Accedi"}</button>
          <div style={{textAlign:"center",marginTop:12}}>
            <button onClick={() => { setStep("forgot_email"); setErr(""); }} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:th.sub}}>Hai dimenticato la password?</button>
          </div>
        </div>
        <div style={{textAlign:"center",marginTop:16}}>
          <span style={{fontSize:13,color:th.sub}}>Non hai un account? </span>
          <button onClick={onGoRegister} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:th.accent,fontWeight:600}}>Registrati</button>
        </div>
      </div>
    </div>
  );
}

// ── Register ──────────────────────────────────────────────────
function RegisterView({ th, onGoLogin }) {
  const [f, setF]       = useState({ name:"", email:"", pass:"", pass2:"" });
  const [err, setErr]   = useState("");
  const [ok,  setOk]    = useState(false);
  const [loading, setL] = useState(false);

  const register = async () => {
    setErr("");
    if (!f.name.trim())  return setErr("Inserisci il tuo nome.");
    if (!f.email.trim()) return setErr("Inserisci l'email.");
    const pwErr = validatePassword(f.pass);
    if (pwErr) return setErr(pwErr);
    if (f.pass !== f.pass2) return setErr("Le password non coincidono.");
    setL(true);
    const { data: nameTaken } = await sb.rpc("is_name_taken", { check_name: f.name.trim() });
    if (nameTaken) { setL(false); return setErr("Questo nome è già in uso, scegline un altro."); }
    const { error } = await sb.auth.signUp({ email: f.email, password: f.pass, options: { data: { full_name: f.name.trim() } } });
    setL(false);
    if (error) return setErr(error.message);
    setOk(true);
  };

  if (ok) return (
    <div style={{minHeight:"100vh",background:th.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{...cardSt(th),maxWidth:380,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:48,marginBottom:12}}>✅</div>
        <h2 style={{color:th.text,marginBottom:8}}>Registrazione completata!</h2>
        <p style={{fontSize:14,color:th.sub,marginBottom:20}}>Controlla la tua email e clicca sul link di conferma per attivare l'account.</p>
        <button onClick={onGoLogin} style={{...primBtn(th),width:"100%"}}>Vai al login</button>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:th.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:40,marginBottom:8}}>📅</div>
          <h1 style={{fontSize:26,fontWeight:700,color:th.text}}>Crea account</h1>
        </div>
        <div style={cardSt(th)}>
          <label style={labelSt(th)}>Nome completo</label>
          <input value={f.name} onChange={e => setF(p => ({...p, name: e.target.value}))} placeholder="Mario Rossi" style={inputSt(th)}/>
          <label style={labelSt(th)}>Email</label>
          <input type="email" value={f.email} onChange={e => setF(p => ({...p, email: e.target.value}))} placeholder="la-tua@email.com" style={inputSt(th)}/>
          <label style={labelSt(th)}>Password</label>
          <div style={{fontSize:11,color:th.sub,marginBottom:6,lineHeight:1.5}}>Min. 8 caratteri con almeno: 1 maiuscola, 1 minuscola, 1 numero e 1 carattere speciale (es. !@#$%)</div>
          <input type="password" value={f.pass} onChange={e => setF(p => ({...p, pass: e.target.value}))} placeholder="Es. Ciao123!" style={inputSt(th)}/>
          <label style={labelSt(th)}>Conferma password</label>
          <input type="password" value={f.pass2} onChange={e => setF(p => ({...p, pass2: e.target.value}))} placeholder="Ripeti la password" style={inputSt(th)}/>
          {err && <div style={{color:th.danger,fontSize:13,marginBottom:12}}>{err}</div>}
          <button onClick={register} disabled={loading} style={{...primBtn(th),width:"100%",opacity:loading?.6:1}}>{loading ? "Registrazione..." : "Crea account"}</button>
        </div>
        <div style={{textAlign:"center",marginTop:16}}>
          <span style={{fontSize:13,color:th.sub}}>Hai già un account? </span>
          <button onClick={onGoLogin} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:th.accent,fontWeight:600}}>Accedi</button>
        </div>
      </div>
    </div>
  );
}

// ── Profile ───────────────────────────────────────────────────
function ProfileView({ th, user, profile, onBack, onLogout }) {
  const [name,  setName]  = useState(profile?.full_name || "");
  const [saved, setSaved] = useState(false);
  const [pass,  setPass]  = useState({ new1:"", new2:"", err:"", ok:false });
  const [tg,    setTg]    = useState({ chatId:"", exists:false, saved:false, loading:true, err:"" });

  useEffect(() => {
    sb.from("telegram_subscriptions").select("chat_id").eq("user_id", user.id).maybeSingle()
      .then(({ data, error }) => {
        if (!error && data) setTg(p => ({...p, chatId: data.chat_id, exists: true}));
        setTg(p => ({...p, loading: false}));
      });
  }, [user.id]);

  const saveProfile = async () => {
    await sb.from("profiles").update({ full_name: name }).eq("id", user.id);
    setSaved(true); setTimeout(() => setSaved(false), 2000);
  };

  const changePass = async () => {
    setPass(p => ({...p, err:"", ok:false}));
    const err = validatePassword(pass.new1);
    if (err) return setPass(p => ({...p, err}));
    if (pass.new1 !== pass.new2) return setPass(p => ({...p, err:"Le password non coincidono."}));
    const { error } = await sb.auth.updateUser({ password: pass.new1 });
    if (error) return setPass(p => ({...p, err:error.message}));
    setPass({ new1:"", new2:"", err:"", ok:true });
  };

  const saveTg = async () => {
    if (!tg.chatId.trim()) return;
    setTg(p => ({...p, err:""}));
    const op = tg.exists
      ? sb.from("telegram_subscriptions").update({ chat_id: tg.chatId }).eq("user_id", user.id)
      : sb.from("telegram_subscriptions").insert({ user_id: user.id, chat_id: tg.chatId });
    const { error } = await op;
    if (error) { setTg(p => ({...p, err:"Errore: " + error.message})); return; }
    setTg(p => ({...p, exists:true, saved:true}));
    setTimeout(() => setTg(p => ({...p, saved:false})), 2000);
  };

  const removeTg = async () => {
    await sb.from("telegram_subscriptions").delete().eq("user_id", user.id);
    setTg(p => ({...p, chatId:"", exists:false}));
  };

  return (
    <div>
      <button onClick={onBack} style={backBtn(th)}>← Indietro</button>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:24}}>
        <Avatar name={profile?.full_name || user.email} size={52}/>
        <div>
          <div style={{fontWeight:700,fontSize:18,color:th.text}}>{profile?.full_name || "Utente"}</div>
          <div style={{fontSize:13,color:th.sub}}>{user.email}</div>
          <div style={{fontSize:11,marginTop:2,padding:"2px 8px",borderRadius:8,display:"inline-block",
            background:profile?.role==="admin"?th.accent+"33":th.ok+"33",
            color:profile?.role==="admin"?th.accent:th.ok,fontWeight:600}}>
            {profile?.role === "admin" ? "👑 Admin" : "👤 Utente"}
          </div>
        </div>
      </div>

      <div style={{...cardSt(th),marginBottom:16}}>
        <div style={{fontSize:12,color:th.sub,marginBottom:10,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Modifica profilo</div>
        <label style={labelSt(th)}>Nome</label>
        <input value={name} onChange={e => setName(e.target.value)} style={inputSt(th)}/>
        <button onClick={saveProfile} style={{...primBtn(th),width:"100%"}}>{saved ? "✅ Salvato!" : "Salva"}</button>
      </div>

      <div style={{...cardSt(th),marginBottom:16}}>
        <div style={{fontSize:12,color:th.sub,marginBottom:10,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>🔔 Notifiche Telegram</div>
        <div style={{fontSize:12,color:th.sub,marginBottom:12,lineHeight:1.6}}>
          Per ricevere notifiche quando viene creato o modificato un evento:<br/><br/>
          <span style={{display:"block",marginBottom:4}}>1️⃣ Apri Telegram e cerca <b>@bacheca_notifiche_bot</b></span>
          <span style={{display:"block",marginBottom:4}}>2️⃣ Clicca <b>START</b> — il bot ti risponderà con il tuo <b>Chat ID</b></span>
          <span style={{display:"block",marginBottom:4}}>3️⃣ Copia quel numero e incollalo qui sotto</span>
        </div>
        {tg.loading ? <div style={{fontSize:13,color:th.sub,padding:"10px 0"}}>Caricamento...</div> : (
          <>
            <label style={labelSt(th)}>Chat ID Telegram</label>
            <input value={tg.chatId} onChange={e => setTg(p => ({...p, chatId:e.target.value}))} placeholder="Es. 123456789" style={inputSt(th)}/>
            {tg.err && <div style={{color:th.danger,fontSize:13,marginBottom:8}}>{tg.err}</div>}
            <div style={{display:"flex",gap:8}}>
              <button onClick={saveTg} style={{...primBtn(th),flex:1}}>{tg.saved ? "✅ Salvato!" : tg.exists ? "Aggiorna" : "Attiva notifiche"}</button>
              {tg.exists && <button onClick={removeTg} style={{...btnSt(th),color:th.danger,border:`1px solid ${th.danger}`,background:"transparent"}}>Disattiva</button>}
            </div>
          </>
        )}
      </div>

      <div style={{...cardSt(th),marginBottom:16}}>
        <div style={{fontSize:12,color:th.sub,marginBottom:10,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Cambia password</div>
        <label style={labelSt(th)}>Nuova password</label>
        <input type="password" value={pass.new1} onChange={e => setPass(p => ({...p, new1:e.target.value}))} placeholder="Min. 8 caratteri" style={inputSt(th)}/>
        <label style={labelSt(th)}>Conferma nuova password</label>
        <input type="password" value={pass.new2} onChange={e => setPass(p => ({...p, new2:e.target.value}))} placeholder="Ripeti" style={inputSt(th)}/>
        {pass.err && <div style={{color:th.danger,fontSize:13,marginBottom:12}}>{pass.err}</div>}
        {pass.ok  && <div style={{color:th.ok,fontSize:13,marginBottom:12}}>✅ Password aggiornata!</div>}
        <button onClick={changePass} style={{...primBtn(th),width:"100%"}}>Aggiorna password</button>
      </div>

      <button onClick={onLogout} style={{width:"100%",padding:12,borderRadius:10,border:`1.5px solid ${th.danger}`,background:"transparent",color:th.danger,fontWeight:600,cursor:"pointer",fontSize:14}}>
        🚪 Esci dall'account
      </button>
    </div>
  );
}

// ── Admin ─────────────────────────────────────────────────────
function AdminView({ th, user, onBack, showToast }) {
  const [users,   setUsers]  = useState([]);
  const [logs,    setLogs]   = useState([]);
  const [trash,   setTrash]  = useState([]);
  const [section, setSection]= useState("users");
  const [loading, setLoading]= useState(true);
  const [confirmDelete, setConfirmDelete] = useState(null);

  useEffect(() => {
    const load = async () => {
      const cutoff = new Date(Date.now() - 30*24*60*60*1000).toISOString();
      const [u, l, t] = await Promise.all([
        sb.from("profiles").select("*").order("created_at"),
        sb.from("activity_log").select("*").gte("created_at", cutoff).order("created_at",{ascending:false}).limit(200),
        sb.from("events").select("*").not("deleted_at","is",null).order("deleted_at",{ascending:false}),
      ]);
      await sb.from("activity_log").delete().lt("created_at", cutoff);
      setUsers(u.data||[]); setLogs(l.data||[]); setTrash(t.data||[]);
      setLoading(false);
    };
    load();
  }, []);

  const toggleRole = async (id, role) => {
    const newRole = role === "admin" ? "user" : "admin";
    await sb.from("profiles").update({ role: newRole }).eq("id", id);
    setUsers(p => p.map(u => u.id===id ? {...u, role:newRole} : u));
    showToast("✅ Ruolo aggiornato");
  };

  const deleteUser = async u => {
    const { data:{ session } } = await sb.auth.getSession();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/delete-user`, {
      method: "POST",
      headers: { "Content-Type":"application/json", "Authorization":`Bearer ${session.access_token}` },
      body: JSON.stringify({ userId: u.id, voterName: u.full_name || u.email }),
    });
    const result = await res.json();
    if (!res.ok || result.error) { showToast("❌ " + (result.error || "Errore")); return; }
    setUsers(p => p.filter(x => x.id !== u.id));
    setConfirmDelete(null);
    showToast("🗑️ Utente eliminato");
  };

  const restoreEvent = async id => {
    await sb.from("events").update({ deleted_at: null }).eq("id", id);
    setTrash(p => p.filter(e => e.id !== id));
    showToast("✅ Evento ripristinato!");
  };

  const permanentDelete = async id => {
    await sb.from("events").delete().eq("id", id);
    setTrash(p => p.filter(e => e.id !== id));
    showToast("🗑️ Evento eliminato definitivamente");
  };

  return (
    <div>
      <button onClick={onBack} style={backBtn(th)}>← Indietro</button>
      <h2 style={{margin:"0 0 16px",fontSize:18,color:th.text}}>👑 Pannello Admin</h2>
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
        {[["users","👥 Utenti"],["logs","📋 Attività"],["trash","🗑️ Cestino"]].map(([s,l]) => (
          <button key={s} onClick={() => setSection(s)}
            style={{padding:"7px 14px",borderRadius:10,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,
              background:section===s?th.accent:th.input,color:section===s?"#fff":th.sub}}>
            {l}{s==="trash" && trash.length>0 && ` (${trash.length})`}
          </button>
        ))}
      </div>

      {loading && <div style={{color:th.sub,textAlign:"center",padding:20}}>Caricamento...</div>}

      {!loading && section==="users" && users.map(u => (
        <div key={u.id} style={{...cardSt(th),marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
            <Avatar name={u.full_name||u.email} size={36}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:14,color:th.text}}>{u.full_name||"—"}</div>
              <div style={{fontSize:12,color:th.sub}}>{u.email}</div>
            </div>
            <span style={{fontSize:11,padding:"2px 8px",borderRadius:8,fontWeight:600,
              background:u.role==="admin"?th.accent+"33":th.ok+"33",
              color:u.role==="admin"?th.accent:th.ok}}>
              {u.role==="admin"?"👑 Admin":"👤 User"}
            </span>
          </div>
          {u.id !== user.id ? (
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              <button onClick={() => toggleRole(u.id, u.role)} style={{...btnSt(th),fontSize:12,width:"100%"}}>
                {u.role==="admin"?"→ Utente":"→ Admin"}
              </button>
              {confirmDelete === u.id ? (
                <div style={{padding:"10px 12px",background:th.danger+"11",borderRadius:10,border:`1px solid ${th.danger}44`}}>
                  <div style={{fontSize:12,color:th.text,marginBottom:8}}>Eliminare <b>{u.full_name||u.email}</b>? Saranno rimossi anche tutti i suoi voti.</div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={() => setConfirmDelete(null)} style={{...btnSt(th),fontSize:12,flex:1}}>Annulla</button>
                    <button onClick={() => deleteUser(u)} style={{...primBtn(th),fontSize:12,flex:1,background:th.danger}}>Sì, elimina</button>
                  </div>
                </div>
              ) : (
                <button onClick={() => setConfirmDelete(u.id)} style={{...btnSt(th),fontSize:12,width:"100%",color:th.danger,border:`1px solid ${th.danger}44`,background:"transparent"}}>🗑️ Elimina utente</button>
              )}
            </div>
          ) : (
            <div style={{fontSize:11,color:th.sub,textAlign:"center"}}>Sei tu</div>
          )}
        </div>
      ))}

      {!loading && section==="logs" && (
        logs.length===0
          ? <div style={{color:th.sub,fontSize:14,textAlign:"center",padding:20}}>Nessuna attività registrata.</div>
          : logs.map(l => (
            <div key={l.id} style={{...cardSt(th),marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:13,fontWeight:600,color:th.text}}>{l.action}</span>
                <span style={{fontSize:11,color:th.sub}}>{new Date(l.created_at).toLocaleDateString("it-IT")}</span>
              </div>
              <div style={{fontSize:12,color:th.sub}}>{l.user_email} · {l.entity_title}</div>
              {l.details && <div style={{fontSize:11,color:th.sub,marginTop:4,fontStyle:"italic"}}>{l.details}</div>}
            </div>
          ))
      )}

      {!loading && section==="trash" && (
        trash.length===0
          ? <div style={{color:th.sub,fontSize:14,textAlign:"center",padding:20}}>Il cestino è vuoto.</div>
          : trash.map(e => {
            const dLeft = e.deleted_at ? 30 - Math.floor((Date.now()-new Date(e.deleted_at))/(1000*60*60*24)) : 0;
            return (
              <div key={e.id} style={{...cardSt(th),marginBottom:10}}>
                <div style={{fontWeight:600,fontSize:14,color:th.text,marginBottom:4}}>{e.title}</div>
                <div style={{fontSize:12,color:th.sub,marginBottom:8}}>
                  Eliminato il {new Date(e.deleted_at).toLocaleDateString("it-IT")} ·{" "}
                  <span style={{color:dLeft<=3?th.danger:th.warn,fontWeight:600}}>{dLeft}gg rimasti</span>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={() => restoreEvent(e.id)} style={{...primBtn(th),fontSize:12,flex:1}}>↩️ Ripristina</button>
                  <button onClick={() => permanentDelete(e.id)} style={{...btnSt(th),fontSize:12,flex:1,color:th.danger}}>🗑️ Elimina</button>
                </div>
              </div>
            );
          })
      )}
    </div>
  );
}

// ── Event Card ────────────────────────────────────────────────
function EventCard({ e, th, onOpen }) {
  const sc    = STATUS_CONFIG[e.status] || STATUS_CONFIG.open;
  const col   = scColor(sc, th);
  const days  = daysUntil(e.deadline);
  const badge = eventBadge(e.date, th);
  return (
    <div onClick={() => onOpen(e)} style={{...cardSt(th),display:"flex",alignItems:"center",gap:12,cursor:"pointer",marginBottom:10}}>
      <div style={{width:12,height:12,borderRadius:"50%",background:col,flexShrink:0,boxShadow:`0 0 6px ${col}88`}}/>
      <div style={{flex:1}}>
        <div style={{fontWeight:600,fontSize:14,color:th.text}}>{e.title}</div>
        <div style={{fontSize:12,color:th.sub}}>{e.organizer}</div>
        {(e.date||e.time) && (
          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:th.accent,fontWeight:600}}>
              {e.date&&`📅 ${e.date}`}{e.date&&e.time&&"  "}{e.time&&`🕐 ${e.time}`}
            </span>
            {badge && (
              <span style={{background:badge.bg,color:badge.color,borderRadius:8,padding:"2px 8px",fontSize:11,fontWeight:600}}>
                {badge.label}
              </span>
            )}
          </div>
        )}
        <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2,flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:th.sub}}>👥 {(e.participants||[]).length} partecipanti</span>
          {days!==null && days<=3 && <DeadlineBadge deadline={e.deadline} th={th}/>}
        </div>
        {e.last_edit && <div style={{fontSize:11,color:th.sub,marginTop:2,fontStyle:"italic"}}>✏️ {e.last_edit}</div>}
      </div>
      <div style={{fontSize:11,fontWeight:600,color:col}}>{sc.label}</div>
    </div>
  );
}

// ── Calendar Grid ─────────────────────────────────────────────
function CalGrid({ calDate, setCalDate, events, th, onDayClick }) {
  const { y, m } = calDate;
  const days  = getDaysInMonth(y, m);
  const first = getFirstDay(y, m);
  const today = new Date();
  const ts    = toDateStr(today.getFullYear(), today.getMonth(), today.getDate());

  const cells = useMemo(() => {
    const arr = [];
    for (let i = 0; i < first; i++) arr.push(null);
    for (let d = 1; d <= days; d++) arr.push(d);
    return arr;
  }, [y, m, first, days]);

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <button onClick={() => setCalDate(p => p.m===0 ? {y:p.y-1,m:11} : {y:p.y,m:p.m-1})} style={btnSt(th)}>‹</button>
        <span style={{fontWeight:700,fontSize:16,color:th.text}}>{MONTHS[m]} {y}</span>
        <button onClick={() => setCalDate(p => p.m===11 ? {y:p.y+1,m:0} : {y:p.y,m:p.m+1})} style={btnSt(th)}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
        {DAYS.map(d => <div key={d} style={{textAlign:"center",fontSize:11,color:th.sub,paddingBottom:4}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {cells.map((d, i) => {
          if (!d) return <div key={i}/>;
          const ds  = toDateStr(y, m, d);
          const isT = ds === ts;
          const evs = events.filter(e => e.date === ds);
          return (
            <div key={i} onClick={() => evs.length && onDayClick(ds, evs)}
              style={{borderRadius:10,padding:"6px 2px",textAlign:"center",cursor:evs.length?"pointer":"default",
                background:isT?th.accent:"transparent",border:`2px solid ${isT?th.accent:"transparent"}`}}>
              <span style={{fontSize:13,fontWeight:isT?700:400,color:isT?"#fff":th.text}}>{d}</span>
              {evs.length>0 && (
                <div style={{display:"flex",justifyContent:"center",gap:2,marginTop:3,flexWrap:"wrap"}}>
                  {evs.slice(0,4).map(e => <div key={e.id} style={{width:6,height:6,borderRadius:"50%",background:scColor(STATUS_CONFIG[e.status]||STATUS_CONFIG.open,th)}}/>)}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Search ────────────────────────────────────────────────────
function SearchView({ events, th, onOpen, onBack }) {
  const [q, setQ] = useState("");
  const ql  = q.trim().toLowerCase();
  const res = useMemo(() =>
    ql ? events.filter(e => (e.title||"").toLowerCase().includes(ql) || (e.notes||"").toLowerCase().includes(ql)) : [],
  [ql, events]);

  return (
    <div>
      <button onClick={onBack} style={backBtn(th)}>← Indietro</button>
      <h2 style={{margin:"0 0 16px",fontSize:18,color:th.text}}>Cerca</h2>
      <input value={q} onChange={e => setQ(e.target.value)} placeholder="🔍 Cerca per titolo o note..." style={inputSt(th)} autoFocus/>
      <div style={{fontSize:11,color:th.sub,marginBottom:16,marginTop:-8}}>La ricerca funziona sui campi <b>titolo</b> e <b>note</b>.</div>
      {ql && res.length===0 && <div style={{color:th.sub,fontSize:14,textAlign:"center",padding:20}}>Nessun risultato per "<b>{q}</b>"</div>}

}

// ── Shopping List ─────────────────────────────────────────────
function ShoppingListView({ event, events, th, onBack, onSave }) {
  const e = events.find(x => x.id===event.id) || event;
  const [items, setItems] = useState(e.shopping_list || []);
  const [ni,    setNi]    = useState({ name:"", qty:"", unit:"pz", assignee:"" });

  const addItem = () => {
    if (!ni.name.trim()) return;
    if (!ni.qty || isNaN(Number(ni.qty)) || Number(ni.qty) <= 0) return;
    const updated = [...items, { id: Date.now(), name: ni.name.trim(), qty: ni.qty, unit: ni.unit, assignee: ni.assignee.trim(), done: false }];
    setItems(updated); onSave(e.id, updated);
    setNi({ name:"", qty:"", unit:"pz", assignee:"" });
  };

  const toggleDone = id => { const u = items.map(i => i.id===id ? {...i, done:!i.done} : i); setItems(u); onSave(e.id, u); };
  const deleteItem = id => { const u = items.filter(i => i.id!==id); setItems(u); onSave(e.id, u); };
  const pending = items.filter(i => !i.done);
  const done    = items.filter(i =>  i.done);

  return (
    <div>
      <button onClick={onBack} style={backBtn(th)}>← Indietro</button>
      <h2 style={{margin:"0 0 4px",fontSize:18,color:th.text}}>🛒 Lista della spesa</h2>
      <div style={{fontSize:13,color:th.sub,marginBottom:16}}>{e.title}</div>
      <div style={{...cardSt(th),marginBottom:16}}>
        <div style={{fontSize:12,color:th.sub,marginBottom:10,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Aggiungi articolo</div>
        <label style={labelSt(th)}>Prodotto *</label>
        <input value={ni.name} onChange={ev => setNi(p => ({...p, name:ev.target.value}))} placeholder="Es. Vino rosso..." style={inputSt(th)}/>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <div style={{flex:1}}>
            <label style={labelSt(th)}>Quantità *</label>
            <input type="number" min="0" step="any" value={ni.qty} onChange={ev => setNi(p => ({...p, qty:ev.target.value}))} placeholder="Es. 2" style={{...inputSt(th),marginBottom:0}}/>
          </div>
          <div style={{flex:1}}>
            <label style={labelSt(th)}>Unità</label>
            <select value={ni.unit} onChange={ev => setNi(p => ({...p, unit:ev.target.value}))} style={{...inputSt(th),marginBottom:0}}>
              {UNITS.map(u => <option key={u}>{u}</option>)}
            </select>
          </div>
        </div>
        <label style={labelSt(th)}>Assegnato a</label>
        <input value={ni.assignee} onChange={ev => setNi(p => ({...p, assignee:ev.target.value}))} placeholder="Nome persona..." style={inputSt(th)}/>
        <button onClick={addItem} style={{...primBtn(th),width:"100%"}}>+ Aggiungi</button>
      </div>
      {pending.length>0 && (
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,color:th.sub,marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Da acquistare ({pending.length})</div>
          {pending.map(item => <ItemRow key={item.id} item={item} th={th} onToggle={toggleDone} onDelete={deleteItem}/>)}
        </div>
      )}
      {done.length>0 && (
        <div>
          <div style={{fontSize:12,color:th.sub,marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Acquistati ({done.length})</div>
          {done.map(item => <ItemRow key={item.id} item={item} th={th} onToggle={toggleDone} onDelete={deleteItem}/>)}
        </div>
      )}
      {items.length===0 && <div style={{textAlign:"center",padding:30,color:th.sub,fontSize:14}}>Nessun articolo ancora.<br/>Aggiungi il primo! 🛒</div>}
    </div>
  );
}

// ── Event Detail ──────────────────────────────────────────────
function EventDetail({ event, events, th, user, profile, onBack, onVote, onToast, onStatusChange, onCancelVote, onDelete, onEdit, onShopping }) {
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [confirmVote,   setConfirmVote]   = useState(null);
  const e   = events.find(x => x.id===event.id) || event;
  const sc  = STATUS_CONFIG[e.status] || STATUS_CONFIG.open;
  const col = scColor(sc, th);
  const maxV      = Math.max(...(e.options||[]).map(o => (e.votes[o]||[]).length), 1);
  const isFull    = e.status === "full";
  const days      = daysUntil(e.deadline);
  const isExp     = days !== null && days < 0;
  const blocked   = isFull || isExp;
  const hasVoted  = Object.values(e.votes||{}).some(v => v.includes(profile?.full_name||user?.email));
  const isOwner   = e.created_by===user?.id || profile?.role==="admin";
  const shCount   = (e.shopping_list||[]).length;
  const shDone    = (e.shopping_list||[]).filter(i => i.done).length;

  const vLabel = () => {
    if (isFull)   return "🔴 Al completo";
    if (isExp)    return "⏰ Scaduto";
    if (hasVoted) return "✅ Hai già votato";
    return "🗳️ Vota";
  };

  const copyResults = () => {
    const lines = [
      `📅 ${e.title}`,
      e.date ? `🗓 ${e.date}${e.time ? " alle "+e.time : ""}` : "",
      `Stato: ${sc.label}`, "",
      "Risultati sondaggio:",
      ...(e.options||[]).map(o => { const v = e.votes[o]||[]; return `• ${o}: ${v.length} vot${v.length===1?"o":"i"}${v.length>0?" ("+v.join(", ")+")":""}`; }),
      "", `👥 ${(e.participants||[]).length} partecipanti`,
    ].filter(Boolean);
    navigator.clipboard?.writeText(lines.join("\n"));
    onToast("📋 Risultati copiati!");
  };

  return (
    <div>
      <button onClick={onBack} style={backBtn(th)}>← Indietro</button>
      <h2 style={{margin:"0 0 6px",fontSize:20,color:th.text}}>{e.title}</h2>
      {e.created_by && (
        <div style={{fontSize:12,color:th.sub,marginBottom:10}}>
          Creato da {e.organizer||"utente"}
          {isOwner && e.created_by!==user?.id && <span style={{marginLeft:6,color:th.accent,fontSize:11,fontWeight:600}}>👑 Sei admin</span>}
        </div>
      )}

      {isOwner ? (
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,color:th.sub,marginBottom:6,fontWeight:600,letterSpacing:0.5,textTransform:"uppercase"}}>Stato evento</div>
          <div style={{display:"flex",gap:8}}>
            {Object.entries(STATUS_CONFIG).map(([k,v]) => {
              const c = scColor(v, th);
              return (
                <button key={k} onClick={() => onStatusChange(e.id, k)}
                  style={{flex:1,padding:"8px 4px",borderRadius:12,cursor:"pointer",border:`2px solid ${e.status===k?c:th.border}`,background:e.status===k?c+"22":th.input,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                  <div style={{width:14,height:14,borderRadius:"50%",background:c,boxShadow:e.status===k?`0 0 8px ${c}88`:"none"}}/>
                  <span style={{fontSize:11,fontWeight:600,color:e.status===k?c:th.sub}}>{v.label}</span>
                </button>
              );
            })}
          </div>
        </div>
      ) : (
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,padding:"8px 14px",background:th.input,borderRadius:12,width:"fit-content",border:`1px solid ${th.border}`}}>
          {Object.entries(STATUS_CONFIG).map(([k,v]) => {
            const c = scColor(v, th);
            return <div key={k} style={{width:14,height:14,borderRadius:"50%",background:e.status===k?c:th.border,boxShadow:e.status===k?`0 0 8px ${c}88`:"none"}}/>;
          })}
          <span style={{fontSize:13,fontWeight:600,color:col,marginLeft:4}}>{sc.label}</span>
        </div>
      )}

      {e.organizer  && <div style={{fontSize:13,color:th.sub,marginBottom:4}}>👤 {e.organizer}</div>}
      {(e.date||e.time) && <div style={{fontSize:13,color:th.accent,fontWeight:600,marginBottom:4}}>{e.date&&`📅 ${e.date}`}{e.date&&e.time&&"  "}{e.time&&`🕐 ${e.time}`}</div>}
      {e.deadline   && <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}><span style={{fontSize:13,color:th.sub}}>⏰ Scadenza: {e.deadline}</span><DeadlineBadge deadline={e.deadline} th={th}/></div>}
      {e.last_edit  && <div style={{fontSize:12,color:th.warn,marginBottom:10,fontStyle:"italic",padding:"6px 10px",background:th.warn+"18",borderRadius:8}}>✏️ {e.last_edit}</div>}
      {e.address    && <div onClick={() => openMaps(e.address)} style={{...cardSt(th),display:"flex",alignItems:"center",gap:8,cursor:"pointer",marginBottom:12}}><span style={{fontSize:18}}>📍</span><div><div style={{fontSize:13,color:th.text}}>{e.address}</div><div style={{fontSize:11,color:th.accent}}>Apri in Google Maps →</div></div></div>}
      {e.notes      && <div style={{...cardSt(th),marginBottom:12}}><div style={{fontSize:12,color:th.sub,marginBottom:4}}>📝 Note</div><div style={{fontSize:13,color:th.text}}>{e.notes}</div></div>}
      {e.social     && <div style={{...cardSt(th),marginBottom:12}}><div style={{fontSize:12,color:th.sub,marginBottom:4}}>🔗 Link Social</div><a href={e.social} target="_blank" rel="noreferrer" style={{fontSize:13,color:th.accent,wordBreak:"break-all"}}>{e.social}</a></div>}

      <div style={{...cardSt(th),marginBottom:12}}>
        <div style={{fontSize:12,color:th.sub,marginBottom:10,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Risultati sondaggio</div>
        {(e.options||[]).map(o => {
          const v = e.votes[o]||[];
          const pct = Math.round((v.length/maxV)*100);
          return (
            <div key={o} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:13,color:th.text}}>{o}</span>
                <span style={{fontSize:13,color:th.sub}}>{v.length} voti</span>
              </div>
              <div style={{background:th.border,borderRadius:6,height:8,overflow:"hidden"}}>
                <div style={{width:`${pct}%`,height:"100%",background:col,borderRadius:6}}/>
              </div>
              {v.length>0 && <div style={{fontSize:11,color:th.sub,marginTop:3}}>{v.join(", ")}</div>}
            </div>
          );
        })}
        <div style={{fontSize:12,color:th.sub,marginTop:8}}>👥 {(e.participants||[]).length} partecipanti al sondaggio</div>
      </div>

      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
        <button onClick={() => { if (!blocked && !hasVoted) onVote(); }} disabled={blocked||hasVoted}
          style={{...primBtn(th),flex:1,opacity:(blocked||hasVoted)?.5:1,cursor:(blocked||hasVoted)?"not-allowed":"pointer",
            background:isFull?th.danger:isExp?th.sub:hasVoted?th.ok:th.accent}}>
          {vLabel()}
        </button>
        <button onClick={copyResults} style={{...btnSt(th),flex:1}}>📋 Copia risultati</button>
      </div>

      {(e.participants||[]).length>0 && !blocked && (
        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:th.sub,marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Ritira un voto</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {(profile?.role==="admin" ? e.participants||[] : (e.participants||[]).filter(p => p===(profile?.full_name||user?.email))).map(p => (
              <button key={p} onClick={() => setConfirmVote(confirmVote===p ? null : p)}
                style={{padding:"4px 10px",borderRadius:20,fontSize:12,cursor:"pointer",border:`1px solid ${confirmVote===p?th.danger:th.border}`,background:confirmVote===p?th.danger+"22":th.input,color:confirmVote===p?th.danger:th.sub}}>
                ✕ {p}
              </button>
            ))}
          </div>
          {confirmVote && (
            <div style={{marginTop:10,padding:"10px 12px",background:th.danger+"11",borderRadius:10,border:`1px solid ${th.danger}44`,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
              <span style={{fontSize:12,color:th.text}}>Rimuovere il voto di <b>{confirmVote}</b>?</span>
              <div style={{display:"flex",gap:6}}>
                <button onClick={() => setConfirmVote(null)} style={{...btnSt(th),fontSize:12,padding:"4px 10px"}}>Annulla</button>
                <button onClick={() => { onCancelVote(e.id, confirmVote); setConfirmVote(null); }} style={{...primBtn(th),fontSize:12,padding:"4px 10px",background:th.danger}}>Rimuovi</button>
              </div>
            </div>
          )}
        </div>
      )}

      {e.lista_spesa && (
        <button onClick={() => onShopping(e)} style={{...btnSt(th),width:"100%",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",border:`1.5px solid ${th.border}`,padding:"12px 14px"}}>
          <span style={{fontWeight:600,color:th.text}}>🛒 Lista della spesa</span>
          <span style={{fontSize:12,color:th.sub}}>{shCount===0?"Nulla ancora":`${shDone}/${shCount} acquistati`}</span>
        </button>
      )}

      {isOwner && (
        <div style={{borderTop:`1px solid ${th.border}`,paddingTop:16,display:"flex",flexDirection:"column",gap:8}}>
          <button onClick={() => onEdit(e)} style={{...btnSt(th),width:"100%",color:th.accent,border:`1.5px solid ${th.accent}`,background:"transparent",fontWeight:600}}>✏️ Modifica sondaggio</button>
          {!confirmDelete
            ? <button onClick={() => setConfirmDelete(true)} style={dangerBtn(th)}>🗑️ Elimina evento</button>
            : <div style={{...cardSt(th),border:`1.5px solid ${th.danger}`}}>
                <div style={{fontSize:14,color:th.text,marginBottom:6,fontWeight:600}}>Eliminare questo evento?</div>
                <div style={{fontSize:12,color:th.sub,marginBottom:14}}>Verrà spostato nel cestino. L'admin potrà recuperarlo entro 30 giorni.</div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={() => setConfirmDelete(false)} style={{...btnSt(th),flex:1}}>Annulla</button>
                  <button onClick={() => onDelete(e.id)} style={{...primBtn(th),flex:1,background:th.danger}}>Sì, elimina</button>
                </div>
              </div>
          }
        </div>
      )}
    </div>
  );
}

// ── Vote View ─────────────────────────────────────────────────
function VoteView({ event, events, th, profile, user, onBack, onSubmit, saving }) {
  const [sel, setSel] = useState([]);
  const e    = events.find(x => x.id===event.id) || event;
  const isM  = e.multi_select === true || e.multiSelect === true;
  const name = profile?.full_name || user?.email || "Utente";

  return (
    <div>
      <button onClick={onBack} style={backBtn(th)}>← Indietro</button>
      <h2 style={{margin:"0 0 4px",fontSize:18,color:th.text}}>{e.title}</h2>
      <div style={{fontSize:13,color:th.sub,marginBottom:12}}>{isM ? "Puoi selezionare più opzioni" : "Seleziona una sola opzione"}</div>
      <div style={{fontSize:13,color:th.accent,marginBottom:16}}>Stai votando come: <b>{name}</b></div>
      {(e.options||[]).map(o => {
        const s = sel.includes(o);
        return (
          <div key={o} onClick={() => isM ? setSel(p => p.includes(o) ? p.filter(x=>x!==o) : [...p, o]) : setSel([o])}
            style={{...cardSt(th),marginBottom:8,cursor:"pointer",border:`2px solid ${s?th.accent:th.border}`,background:s?th.accent+"18":th.card}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:14,color:th.text}}>{o}</span>
              <span style={{fontSize:18}}>{s?"✅":"⬜"}</span>
            </div>
          </div>
        );
      })}
      <button onClick={() => sel.length && onSubmit(name, sel)} disabled={saving || !sel.length}
        style={{...primBtn(th),width:"100%",marginTop:8,opacity:saving?.6:1}}>
        {saving ? "Salvataggio..." : "Conferma voto"}
      </button>
    </div>
  );
}

// ── Event Form ────────────────────────────────────────────────
function EventForm({ event, th, onBack, onSubmit, saving, isEdit, profile }) {
  const [form, setForm] = useState({
    title:       event?.title      || "",
    organizer:   event?.organizer  || profile?.full_name || "",
    address:     event?.address    || "",
    date:        event?.date       || "",
    time:        event?.time       || "",
    deadline:    event?.deadline   || "",
    notes:       event?.notes      || "",
    social:      event?.social     || "",
    status:      event?.status     || "open",
    multiSelect: event?.multiSelect || event?.multi_select || false,
    listaSpesa:  event?.lista_spesa || false,
    options:     event?.options?.length ? [...event.options] : [""],
  });

  const updOpt = (i, v) => setForm(f => { const o = [...f.options]; o[i] = v; return {...f, options:o}; });

  return (
    <div>
      <button onClick={onBack} style={backBtn(th)}>← Indietro</button>
      <h2 style={{margin:"0 0 8px",fontSize:18,color:th.text}}>{isEdit ? "Modifica sondaggio" : "Nuovo sondaggio"}</h2>
      {isEdit && <div style={{fontSize:12,color:th.warn,marginBottom:16,padding:"6px 10px",background:th.warn+"18",borderRadius:8}}>⚠️ I voti esistenti verranno mantenuti.</div>}

      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <span style={{fontSize:13,color:th.text}}>🛒 Lista della spesa</span>
        <Toggle value={form.listaSpesa} onChange={() => setForm(f => ({...f, listaSpesa:!f.listaSpesa}))} th={th}/>
      </div>

      <label style={labelSt(th)}>Titolo evento *</label>
      <input value={form.title} onChange={e => setForm(f => ({...f, title:e.target.value}))} placeholder="Es. Concerto, Cena..." style={inputSt(th)}/>
      <label style={labelSt(th)}>Organizzatore</label>
      <input value={form.organizer} onChange={e => setForm(f => ({...f, organizer:e.target.value}))} placeholder="Il tuo nome" style={inputSt(th)}/>
      <label style={labelSt(th)}>Indirizzo / Luogo</label>
      <input value={form.address} onChange={e => setForm(f => ({...f, address:e.target.value}))} placeholder="Via, Città..." style={inputSt(th)}/>
      <label style={labelSt(th)}>Data e ora evento</label>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <input type="date" value={form.date} onChange={e => setForm(f => ({...f, date:e.target.value}))} style={{...inputSt(th),marginBottom:0,flex:2}}/>
        <input type="time" value={form.time} onChange={e => setForm(f => ({...f, time:e.target.value}))} style={{...inputSt(th),marginBottom:0,flex:1}}/>
      </div>
      <label style={labelSt(th)}>Scadenza sondaggio</label>
      <input type="date" value={form.deadline} onChange={e => setForm(f => ({...f, deadline:e.target.value}))} style={inputSt(th)}/>
      <label style={labelSt(th)}>Note</label>
      <textarea value={form.notes} onChange={e => setForm(f => ({...f, notes:e.target.value}))} placeholder="Descrizione..." style={{...inputSt(th),height:72,resize:"vertical"}}/>
      <label style={labelSt(th)}>Link Social / Sito</label>
      <input value={form.social} onChange={e => setForm(f => ({...f, social:e.target.value}))} placeholder="https://..." style={inputSt(th)}/>

      <label style={labelSt(th)}>Stato evento</label>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {(isEdit ? Object.entries(STATUS_CONFIG) : Object.entries(STATUS_CONFIG).filter(([k]) => k!=="full")).map(([k,v]) => {
          const c = scColor(v, th);
          return (
            <button key={k} onClick={() => setForm(f => ({...f, status:k}))}
              style={{flex:1,padding:"8px 4px",borderRadius:12,cursor:"pointer",border:`2px solid ${form.status===k?c:th.border}`,background:form.status===k?c+"22":th.input,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{width:14,height:14,borderRadius:"50%",background:c,boxShadow:form.status===k?`0 0 8px ${c}88`:"none"}}/>
              <span style={{fontSize:11,fontWeight:600,color:form.status===k?c:th.sub}}>{v.label}</span>
            </button>
          );
        })}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <span style={{fontSize:13,color:th.text}}>Selezione multipla</span>
        <Toggle value={form.multiSelect} onChange={() => setForm(f => ({...f, multiSelect:!f.multiSelect}))} th={th}/>
      </div>

      <label style={labelSt(th)}>Opzioni * {isEdit && <span style={{color:th.sub,fontWeight:400,textTransform:"none"}}>(voti conservati)</span>}</label>
      {form.options.map((o, i) => (
        <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
          <div style={{width:22,height:22,borderRadius:"50%",background:th.accent,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,flexShrink:0}}>{i+1}</div>
          <input value={o} onChange={e => updOpt(i, e.target.value)} placeholder={`Opzione ${i+1}…`} style={{...inputSt(th),marginBottom:0,flex:1}}/>
          {form.options.length > (form.multiSelect ? 2 : 1) && (
            <button onClick={() => setForm(f => ({...f, options:f.options.filter((_,idx) => idx!==i)}))} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:th.sub}}>✕</button>
          )}
        </div>
      ))}
      <button onClick={() => setForm(f => ({...f, options:[...f.options,""]}))} style={{...btnSt(th),width:"100%",marginBottom:16,border:`1.5px dashed ${th.border}`,background:"transparent",color:th.accent,fontWeight:600}}>+ Aggiungi opzione</button>
      <button onClick={() => onSubmit(form)} disabled={saving} style={{...primBtn(th),width:"100%",opacity:saving?.6:1}}>
        {saving ? "Salvataggio..." : isEdit ? "Salva modifiche ✏️" : "Crea sondaggio 🎉"}
      </button>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────
function App() {
  const [dark,    setDark]    = useState(() => localStorage.getItem("bacheca_dark") === "1");
  const [auth,    setAuth]    = useState("loading");
  const [user,    setUser]    = useState(null);
  const [profile, setProfile] = useState(null);
  const [profileLoaded, setPL]= useState(false);
  const [view,    setView]    = useState("calendar");
  const [tab,     setTab]     = useState("cal");
  const [events,  setEvents]  = useState([]);
  const [loading, setLoading] = useState(true);
  const [selEvent,setSelEvent]= useState(null);
  const [calDate, setCalDate] = useState({ y: new Date().getFullYear(), m: new Date().getMonth() });
  const [filtDay, setFiltDay] = useState(null);
  const [toast,   setToast]   = useState(null);
  const [saving,  setSaving]  = useState(false);
  const [showPast,setShowPast]= useState(false);

  const th = useMemo(() => dark ? DARK : LIGHT, [dark]);

  const toggleDark = () => setDark(d => { localStorage.setItem("bacheca_dark", d?"0":"1"); return !d; });
  const showToast  = msg => { setToast(msg); setTimeout(() => setToast(null), 2500); };

  useEffect(() => {
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) { setUser(session.user); setAuth("app"); }
      else setAuth("login");
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_, session) => {
      if (session) { setUser(session.user); setAuth("app"); }
      else { setUser(null); setProfile(null); setAuth("login"); }
    });
    return () => subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (!user) return;
    sb.from("profiles").select("*").eq("id", user.id).single()
      .then(({ data }) => { if (data) setProfile(data); setPL(true); });
  }, [user]);

  const loadEvents = useCallback(async () => {
    if (!user || !profileLoaded) return;
    const { data, error } = await sb.from("events").select("*").is("deleted_at", null).order("date", { ascending: true, nullsFirst: false });
    if (error) { showToast("❌ Errore caricamento"); return; }
    setEvents(data.map(e => ({ ...e, options: e.options||[], participants: e.participants||[], votes: e.votes||{}, shopping_list: e.shopping_list||[], multiSelect: e.multi_select })));
    setLoading(false);
  }, [user, profileLoaded]);

  useEffect(() => { if (auth==="app" && profileLoaded) loadEvents(); }, [auth, loadEvents, profileLoaded]);

  const logActivity = async (action, event, details = "") => {
    await sb.from("activity_log").insert({ user_id:user.id, user_email:user.email, action, entity_type:"event", entity_id:event?.id, entity_title:event?.title, details });
  };

  const buildEditLog = (old, form) => {
    const changes = [];
    const cmp = (a, b) => (a||"").trim() === (b||"").trim();
    if (!cmp(old.title,    form.title))    changes.push("titolo");
    if (!cmp(old.date,     form.date))     changes.push("data");
    if (!cmp(old.time,     form.time))     changes.push("orario");
    if (!cmp(old.address,  form.address))  changes.push("luogo");
    if (!cmp(old.deadline, form.deadline)) changes.push("scadenza");
    if (!cmp(old.notes,    form.notes))    changes.push("note");
    if (!cmp(old.social,   form.social))   changes.push("link social");
    if (!cmp(old.status,   form.status))   changes.push("stato");
    if (!!(old.multiSelect||old.multi_select) !== !!form.multiSelect) changes.push("tipo selezione");
    if (!!old.lista_spesa !== !!form.listaSpesa) changes.push("lista della spesa");
    if (JSON.stringify((old.options||[]).map(o=>(o||"").trim()).filter(Boolean)) !== JSON.stringify(form.options.map(o=>(o||"").trim()).filter(Boolean))) changes.push("opzioni");
    if (!changes.length) return null;
    const now = new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
    return `${now} — Modificato: ${changes.join(", ")}`;
  };

  const handleCreate = async form => {
    const opts = form.options.map(o => o.trim()).filter(Boolean);
    if (!form.title.trim()) return showToast("Inserisci un titolo!");
    if (opts.length < 1)    return showToast("Aggiungi almeno un'opzione!");
    if (form.multiSelect && opts.length < 2) return showToast("Con selezione multipla servono almeno 2 opzioni!");
    setSaving(true);
    const votes = {}; opts.forEach(o => { votes[o] = []; });
    const { data, error } = await sb.from("events").insert({
      title:form.title, organizer:form.organizer||profile?.full_name, address:form.address,
      date:form.date, time:form.time, deadline:form.deadline, notes:form.notes, social:form.social,
      status:form.status, multi_select:form.multiSelect, lista_spesa:form.listaSpesa,
      options:opts, participants:[], votes, shopping_list:[], created_by:user.id,
    }).select().single();
    setSaving(false);
    if (error) return showToast("❌ Errore salvataggio");
    await logActivity("Evento creato", data);
    showToast("🎉 Sondaggio creato!"); await loadEvents(); setTab("cal"); setView("calendar");
  };

  const handleEdit = async (form, old) => {
    const opts = form.options.map(o => o.trim()).filter(Boolean);
    if (!form.title.trim()) return showToast("Inserisci un titolo!");
    if (opts.length < 1)    return showToast("Aggiungi almeno un'opzione!");
    if (form.multiSelect && opts.length < 2) return showToast("Con selezione multipla servono almeno 2 opzioni!");
    const log = buildEditLog(old, {...form, options:opts});
    if (!log) { showToast("Nessuna modifica rilevata."); return; }
    const votes = {...old.votes}; opts.forEach(o => { if (!votes[o]) votes[o] = []; });
    setSaving(true);
    const { error } = await sb.from("events").update({
      title:form.title, organizer:form.organizer, address:form.address, date:form.date, time:form.time,
      deadline:form.deadline, notes:form.notes, social:form.social, status:form.status,
      multi_select:form.multiSelect, lista_spesa:form.listaSpesa, options:opts, votes, last_edit:log,
    }).eq("id", old.id);
    setSaving(false);
    if (error) return showToast("❌ Errore salvataggio");
    await logActivity("Evento modificato", {...old, ...form}, log);
    showToast("✏️ Modifiche salvate!"); await loadEvents(); setView("event");
  };

  const handleVote = async (voterName, sel) => {
    const e = events.find(x => x.id===selEvent.id);
    setSaving(true);
    const { error } = await sb.rpc("cast_vote", { p_event_id:e.id, p_voter:voterName, p_options:sel });
    setSaving(false);
    if (error) return showToast("❌ " + error.message);
    await logActivity("Voto registrato", e, sel.join(", "));
    showToast("✅ Voto registrato!"); await loadEvents(); setView("event");
  };

  const handleCancelVote = async (id, voterName) => {
    const e = events.find(x => x.id===id);
    const { error } = await sb.rpc("cancel_vote", { p_event_id:id, p_voter:voterName });
    if (error) return showToast("❌ " + error.message);
    await logActivity("Voto ritirato", e, `Voto di ${voterName} rimosso`);
    showToast("↩️ Voto ritirato!"); await loadEvents();
  };

  const handleStatusChange = async (id, status) => {
    const { error } = await sb.from("events").update({ status }).eq("id", id);
    if (error) return showToast("❌ Errore");
    showToast("✅ Stato aggiornato!"); await loadEvents();
  };

  const handleDelete = async id => {
    const e = events.find(x => x.id===id);
    const { error } = await sb.from("events").update({ deleted_at: new Date().toISOString() }).eq("id", id);
    if (error) return showToast("❌ Errore");
    await logActivity("Evento eliminato", e, "Spostato nel cestino");
    showToast("🗑️ Evento spostato nel cestino"); await loadEvents(); setView("calendar");
  };

  const handleShopSave = async (id, shopping_list) => {
    const { error } = await sb.from("events").update({ shopping_list }).eq("id", id);
    if (error) { showToast("❌ Errore salvataggio"); return; }
    setEvents(p => p.map(e => e.id===id ? {...e, shopping_list} : e));
  };

  const handleLogout = async () => { await sb.auth.signOut(); setView("calendar"); setTab("cal"); };
  const openEvent    = e => { setSelEvent(e); setView("event"); };

  // ── Auth states ────────────────────────────────────────────
  if (auth === "loading") return (
    <div style={{minHeight:"100vh",background:th.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontSize:40}}>📅</div>
    </div>
  );
  if (auth === "recovery") return <PasswordRecoveryView th={th} onDone={() => setAuth("login")}/>;
  if (auth === "login")    return <LoginView th={th} onGoRegister={() => setAuth("register")} onRecovery={u => { setUser(u); setAuth("recovery"); }}/>;
  if (auth === "register") return <RegisterView th={th} onGoLogin={() => setAuth("login")}/>;

  // ── Main view ──────────────────────────────────────────────
  const mainContent = () => {
    if (view==="event")    return <EventDetail event={selEvent} events={events} th={th} user={user} profile={profile} onBack={() => setView("calendar")} onVote={() => setView("vote")} onToast={showToast} onStatusChange={handleStatusChange} onCancelVote={handleCancelVote} onDelete={handleDelete} onEdit={e => { setSelEvent(e); setView("edit"); }} onShopping={e => { setSelEvent(e); setView("shopping"); }}/>;
    if (view==="vote")     return <VoteView event={selEvent} events={events} th={th} profile={profile} user={user} onBack={() => setView("event")} onSubmit={handleVote} saving={saving}/>;
    if (view==="edit")     return <EventForm event={selEvent} th={th} onBack={() => setView("event")} onSubmit={form => handleEdit(form, selEvent)} saving={saving} isEdit={true} profile={profile}/>;
    if (view==="shopping") return <ShoppingListView event={selEvent} events={events} th={th} onBack={() => setView("event")} onSave={handleShopSave}/>;
    if (view==="profile")  return <ProfileView th={th} user={user} profile={profile} onBack={() => setView("calendar")} onLogout={handleLogout}/>;
    if (view==="admin")    return <AdminView th={th} user={user} onBack={() => setView("calendar")} showToast={showToast}/>;
    if (tab==="new")       return <EventForm th={th} profile={profile} onBack={() => { setTab("cal"); setView("calendar"); }} onSubmit={handleCreate} saving={saving} isEdit={false}/>;
    if (tab==="search")    return <SearchView events={events} th={th} onOpen={openEvent} onBack={() => setTab("cal")}/>;

    // ── Calendar + lista eventi ───────────────────────────────
    const today = new Date(); today.setHours(0,0,0,0);
    const future = events.filter(e => !e.date || new Date(e.date+"T00:00:00") >= today);
    const past   = events.filter(e =>  e.date && new Date(e.date+"T00:00:00") <  today);

    return (
      <div>
        <CalGrid calDate={calDate} setCalDate={setCalDate} events={events} th={th} onDayClick={(ds, evs) => setFiltDay({ date:ds, events:evs })}/>
        <div style={{marginTop:20}}>
          {filtDay ? (
            <>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <div style={{fontSize:13,fontWeight:600,color:th.sub,letterSpacing:1,textTransform:"uppercase"}}>
                  📅 {new Date(filtDay.date+"T00:00:00").toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"})}
                </div>
                <button onClick={() => setFiltDay(null)} style={{...btnSt(th),fontSize:12,padding:"4px 10px"}}>✕ Tutti</button>
              </div>
              {filtDay.events.map(e => <EventCard key={e.id} e={e} th={th} dark={dark} onOpen={openEvent}/>)}
            </>
          ) : (
            <>
              <div style={{fontSize:13,fontWeight:600,color:th.sub,marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>Prossimi eventi</div>
              {loading && <div style={{color:th.sub,fontSize:13,textAlign:"center",padding:20}}>Caricamento...</div>}
              {!loading && future.length===0 && past.length===0 && (
                <div style={{color:th.sub,fontSize:14,textAlign:"center",padding:20}}>Nessun evento ancora.<br/>Creane uno! 🎉</div>
              )}
              {!loading && future.length===0 && past.length>0 && (
                <div style={{color:th.sub,fontSize:13,textAlign:"center",padding:"12px 0"}}>Nessun evento futuro.</div>
              )}
              {future.map(e => <EventCard key={e.id} e={e} th={th} dark={dark} onOpen={openEvent}/>)}

              {!loading && past.length>0 && (
                <div style={{marginTop:12}}>
                  <button
                    onClick={() => setShowPast(p => !p)}
                    style={{...btnSt(th),width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:showPast?8:0}}>
                    <span style={{fontSize:12,fontWeight:600,color:th.sub,letterSpacing:1,textTransform:"uppercase"}}>
                      📁 Eventi passati ({past.length})
                    </span>
                    <span style={{fontSize:14,color:th.sub}}>{showPast?"▲":"▼"}</span>
                  </button>
                  {showPast && past.slice().reverse().map(e => (
                    <div key={e.id} style={{opacity:0.55}}>
                      <EventCard e={e} th={th} dark={dark} onOpen={openEvent}/>
                    </div>
                  ))}
                </div>
              )}
            </>
          )}
        </div>
      </div>
    );
  };

  const showNav = !["event","vote","edit","shopping","profile","admin"].includes(view);

  return (
    <div style={{background:th.bg,minHeight:"100vh",maxWidth:430,margin:"0 auto",position:"relative"}}>
      {/* Header */}
      <div style={{background:th.card,borderBottom:`1px solid ${th.border}`,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10}}>
        <div>
          <div style={{fontWeight:700,fontSize:17,color:th.text}}>📅 Bacheca</div>
          <div style={{fontSize:11,color:th.sub}}>{MONTHS[calDate.m]} {calDate.y}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {profile?.role==="admin" && (
            <button onClick={() => { setView("admin"); setTab("cal"); }} style={{...btnSt(th),fontSize:12,padding:"6px 10px"}}>👑</button>
          )}
          <button onClick={toggleDark} style={{background:th.input,border:`1px solid ${th.border}`,borderRadius:20,padding:"6px 12px",cursor:"pointer",fontSize:13,color:th.text}}>{dark?"☀️":"🌙"}</button>
          <div onClick={() => setView("profile")} style={{cursor:"pointer"}}>
            <Avatar name={profile?.full_name || user?.email} size={32}/>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{padding:16,paddingBottom:90}}>{mainContent()}</div>

      {/* Toast */}
      {toast && (
        <div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",background:th.text,color:th.bg,padding:"10px 20px",borderRadius:20,fontSize:13,zIndex:100,whiteSpace:"nowrap",boxShadow:`0 4px 16px ${th.border}`}}>
          {toast}
        </div>
      )}

      {/* Bottom Nav */}
      {showNav && (
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:th.card,borderTop:`1px solid ${th.border}`,display:"flex",padding:"10px 0 14px",zIndex:10}}>
          {[["cal","🗓️","Calendario"],["new","➕","Crea"],["search","🔍","Cerca"]].map(([t, ic, lb]) => (
            <button key={t} onClick={() => { setTab(t); setView("calendar"); }}
              style={{flex:1,border:"none",background:"transparent",cursor:"pointer",color:tab===t&&view==="calendar"?th.accent:th.sub,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:22}}>{ic}</span>
              <span style={{fontSize:10,fontWeight:tab===t&&view==="calendar"?700:400}}>{lb}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
