<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bacheca</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    input, textarea, button, select { font-family: inherit; font-size: 16px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">

const { useState, useEffect, useCallback } = React;

const SUPABASE_URL = "https://divxqcadlishdfhpvixd.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRpdnhxY2FkbGlzaGRmaHB2aXhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4ODM4OTQsImV4cCI6MjA5NTQ1OTg5NH0.EqTuOJBLsrSIA1vK3eNP4YZnzR6_GxqO_TsEKaEfxYg";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const STATUS_CONFIG = {
  open:    { label: "Prenotabile",    color: "#43C59E" },
  pending: { label: "In valutazione", color: "#F7B731" },
  full:    { label: "Al completo",    color: "#FC5C65" },
};
const UNITS = ["pz","kg","g","L","cl","ml"];

const MONTHS_IT = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
const DAYS_IT   = ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
const getDaysInMonth = (y,m) => new Date(y,m+1,0).getDate();
const getFirstDay    = (y,m) => new Date(y,m,1).getDay();
const toDateStr      = (y,m,d) => `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
const openMaps       = addr => window.open("https://maps.google.com/?q="+encodeURIComponent(addr),"_blank");

const daysUntilDeadline = (deadline) => {
  if (!deadline) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const dl = new Date(deadline); dl.setHours(0,0,0,0);
  return Math.round((dl - today) / 86400000);
};

const cardSt       = th => ({ background:th.card, borderRadius:14, padding:14, border:`1px solid ${th.border}` });
const btnSt        = th => ({ background:th.input, border:"none", borderRadius:10, padding:"8px 14px", cursor:"pointer", fontSize:13, color:th.text });
const backBtnSt    = th => ({ background:th.accent, border:"none", borderRadius:12, padding:"10px 20px", cursor:"pointer", fontSize:14, color:"#fff", fontWeight:700, display:"inline-flex", alignItems:"center", gap:6, marginBottom:18, boxShadow:"0 2px 8px rgba(108,99,255,0.25)" });
const primaryBtnSt = th => ({ background:th.accent, border:"none", borderRadius:10, padding:"10px 16px", cursor:"pointer", fontSize:13, color:"#fff", fontWeight:600 });
const inputSt      = th => ({ width:"100%", background:th.input, border:`1px solid ${th.border}`, borderRadius:10, padding:"10px 12px", fontSize:16, color:th.text, marginBottom:12, boxSizing:"border-box", outline:"none" });
const labelSt      = th => ({ display:"block", fontSize:12, color:th.sub, marginBottom:4, fontWeight:600, letterSpacing:0.5, textTransform:"uppercase" });

function DeadlineBadge({ deadline, dark }) {
  const days = daysUntilDeadline(deadline);
  if (days === null) return null;
  if (days < 0)   return <span style={{background:dark?"#2a2a2a":"#eee",color:dark?"#aaa":"#666",borderRadius:8,padding:"2px 8px",fontSize:11,fontWeight:600}}>⏰ Sondaggio scaduto</span>;
  if (days === 0) return <span style={{background:dark?"#FC5C6533":"#FC5C6522",color:dark?"#F5C4B3":"#993C1D",borderRadius:8,padding:"2px 8px",fontSize:11,fontWeight:600}}>🔴 Scade oggi!</span>;
  if (days <= 3)  return <span style={{background:dark?"#F7B73133":"#F7B73122",color:dark?"#FAC775":"#854F0B",borderRadius:8,padding:"2px 8px",fontSize:11,fontWeight:600}}>⚠️ Scade tra {days} giorn{days===1?"o":"i"}</span>;
  return null;
}

function EventCard({ e, th, onOpen }) {
  const sc = STATUS_CONFIG[e.status] || STATUS_CONFIG.open;
  const days = daysUntilDeadline(e.deadline);
  return (
    <div onClick={() => onOpen(e)} style={{...cardSt(th),display:"flex",alignItems:"center",gap:12,cursor:"pointer",marginBottom:10}}>
      <div style={{width:12,height:12,borderRadius:"50%",background:sc.color,flexShrink:0,boxShadow:`0 0 6px ${sc.color}`}}/>
      <div style={{flex:1}}>
        <div style={{fontWeight:600,fontSize:14,color:th.text}}>{e.title}</div>
        <div style={{fontSize:12,color:th.sub}}>{e.organizer}</div>
        {(e.date||e.time) && <div style={{fontSize:12,color:th.accent,fontWeight:600,marginTop:2}}>{e.date&&`📅 ${e.date}`}{e.date&&e.time&&"  "}{e.time&&`🕐 ${e.time}`}</div>}
        <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2,flexWrap:"wrap"}}>
          <span style={{fontSize:12,color:th.sub}}>👥 {(e.participants||[]).length} partecipanti</span>
          {days!==null&&days<=3&&<DeadlineBadge deadline={e.deadline} dark={false}/>}
        </div>
        {e.last_edit&&<div style={{fontSize:11,color:th.sub,marginTop:2,fontStyle:"italic"}}>✏️ {e.last_edit}</div>}
      </div>
      <div style={{fontSize:11,fontWeight:600,color:sc.color}}>{sc.label}</div>
    </div>
  );
}

function CalGrid({ calDate, setCalDate, events, th, onDayClick }) {
  const {y,m} = calDate;
  const days=getDaysInMonth(y,m), first=getFirstDay(y,m);
  const today = new Date();
  const todayStr = toDateStr(today.getFullYear(),today.getMonth(),today.getDate());
  const cells=[];
  for(let i=0;i<first;i++) cells.push(null);
  for(let d=1;d<=days;d++) cells.push(d);
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <button onClick={()=>setCalDate(p=>p.m===0?{y:p.y-1,m:11}:{y:p.y,m:p.m-1})} style={btnSt(th)}>‹</button>
        <span style={{fontWeight:700,fontSize:16,color:th.text}}>{MONTHS_IT[m]} {y}</span>
        <button onClick={()=>setCalDate(p=>p.m===11?{y:p.y+1,m:0}:{y:p.y,m:p.m+1})} style={btnSt(th)}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
        {DAYS_IT.map(d=><div key={d} style={{textAlign:"center",fontSize:11,color:th.sub,paddingBottom:4}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {cells.map((d,i)=>{
          if(!d) return <div key={i}/>;
          const ds=toDateStr(y,m,d), isToday=ds===todayStr;
          const dayEvs=events.filter(e=>e.date===ds);
          return (
            <div key={i} onClick={()=>{if(dayEvs.length)onDayClick(ds,dayEvs);}}
              style={{borderRadius:10,padding:"6px 2px",textAlign:"center",cursor:dayEvs.length?"pointer":"default",
                background:isToday?th.accent:"transparent",border:`2px solid ${isToday?th.accent:"transparent"}`}}>
              <span style={{fontSize:13,fontWeight:isToday?700:400,color:isToday?"#fff":th.text}}>{d}</span>
              {dayEvs.length>0&&(
                <div style={{display:"flex",justifyContent:"center",gap:2,marginTop:3,flexWrap:"wrap"}}>
                  {dayEvs.slice(0,4).map(e=><div key={e.id} style={{width:6,height:6,borderRadius:"50%",background:STATUS_CONFIG[e.status]?.color||"#6C63FF"}}/>)}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function SearchView({ events, th, onOpen, onBack }) {
  const [query, setQuery] = useState("");
  const q = query.trim().toLowerCase();
  const results = q ? events.filter(e=>(e.title||"").toLowerCase().includes(q)||(e.notes||"").toLowerCase().includes(q)) : [];
  return (
    <div>
      <button onClick={onBack} style={backBtnSt(th)}>← Indietro</button>
      <h2 style={{margin:"0 0 16px",fontSize:18,color:th.text}}>Cerca</h2>
      <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="🔍 Cerca per titolo o note..." style={inputSt(th)} autoFocus/>
      <div style={{fontSize:11,color:th.sub,marginBottom:16,marginTop:-8}}>La ricerca funziona sui campi <b>titolo evento</b> e <b>note</b>.</div>
      {q&&results.length===0&&<div style={{color:th.sub,fontSize:14,textAlign:"center",padding:20}}>Nessun risultato per "<b>{query}</b>"</div>}
      {results.map(e=><EventCard key={e.id} e={e} th={th} onOpen={onOpen}/>)}
    </div>
  );
}

// ── ShoppingListView ─────────────────────────────────────────
function ItemRow({ item, th, dark, onToggle, onDelete }) {
  const [confirmDel, setConfirmDel] = React.useState(false);
  return (
    <div style={{...cardSt(th),marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div onClick={()=>onToggle(item.id)} style={{width:22,height:22,borderRadius:6,flexShrink:0,cursor:"pointer",
          border:`2px solid ${item.done?"#43C59E":th.accent}`,background:item.done?"#43C59E":"transparent",
          display:"flex",alignItems:"center",justifyContent:"center"}}>
          {item.done&&<span style={{color:"#fff",fontSize:13,fontWeight:700}}>✓</span>}
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:600,color:item.done?th.sub:th.text,textDecoration:item.done?"line-through":"none"}}>{item.name}</div>
          <div style={{fontSize:12,color:th.sub,marginTop:2}}>
            {item.qty&&`${item.qty} ${item.unit}`}{item.qty&&item.assignee&&" · "}{item.assignee&&`👤 ${item.assignee}`}
          </div>
        </div>
        <button onClick={()=>setConfirmDel(true)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:th.sub,padding:"4px"}}>✕</button>
      </div>
      {confirmDel&&(
        <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${th.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <span style={{fontSize:12,color:th.text}}>Eliminare <b>{item.name}</b>?</span>
          <div style={{display:"flex",gap:6}}>
            <button onClick={()=>setConfirmDel(false)} style={{...btnSt(th),fontSize:12,padding:"4px 10px"}}>Annulla</button>
            <button onClick={()=>onDelete(item.id)} style={{...primaryBtnSt(th),fontSize:12,padding:"4px 10px",background:"#FC5C65"}}>Elimina</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ShoppingListView ─────────────────────────────────────────
function ShoppingListView({ event, events, th, dark, onBack, onSave, saving }) { // v6
  const e = events.find(x=>x.id===event.id)||event;
  const [items, setItems] = useState(e.shopping_list||[]);
  const [newItem, setNewItem] = useState({ name:"", qty:"", unit:"pz", assignee:"" });

  const addItem = () => {
    if (!newItem.name.trim()) return;
    const item = { id:Date.now(), name:newItem.name.trim(), qty:newItem.qty, unit:newItem.unit, assignee:newItem.assignee.trim(), done:false };
    const updated = [...items, item];
    setItems(updated); onSave(e.id, updated);
    setNewItem({ name:"", qty:"", unit:"pz", assignee:"" });
  };
  const toggleDone = (id) => {
    const updated = items.map(i=>i.id===id?{...i,done:!i.done}:i);
    setItems(updated); onSave(e.id, updated);
  };
  const deleteItem = (id) => {
    const updated = items.filter(i=>i.id!==id);
    setItems(updated); onSave(e.id, updated);
  };

  const pending = items.filter(i=>!i.done);
  const done    = items.filter(i=>i.done);

  return (
    <div>
      <button onClick={onBack} style={backBtnSt(th)}>← Indietro</button>
      <h2 style={{margin:"0 0 4px",fontSize:18,color:th.text}}>🛒 Lista della spesa</h2>
      <div style={{fontSize:13,color:th.sub,marginBottom:16}}>{e.title}</div>

      {/* Form aggiunta */}
      <div style={{...cardSt(th),marginBottom:16}}>
        <div style={{fontSize:12,color:th.sub,marginBottom:10,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Aggiungi articolo</div>
        <label style={labelSt(th)}>Prodotto *</label>
        <input value={newItem.name} onChange={ev=>setNewItem(p=>({...p,name:ev.target.value}))}
          placeholder="Es. Vino rosso, Pasta..." style={inputSt(th)}/>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <div style={{flex:1}}>
            <label style={labelSt(th)}>Quantità</label>
            <input value={newItem.qty} onChange={ev=>setNewItem(p=>({...p,qty:ev.target.value}))}
              placeholder="Es. 2" style={{...inputSt(th),marginBottom:0}}/>
          </div>
          <div style={{flex:1}}>
            <label style={labelSt(th)}>Unità</label>
            <select value={newItem.unit} onChange={ev=>setNewItem(p=>({...p,unit:ev.target.value}))}
              style={{...inputSt(th),marginBottom:0}}>
              {UNITS.map(u=><option key={u} value={u}>{u}</option>)}
            </select>
          </div>
        </div>
        <label style={labelSt(th)}>Assegnato a</label>
        <input value={newItem.assignee} onChange={ev=>setNewItem(p=>({...p,assignee:ev.target.value}))}
          placeholder="Nome persona..." style={inputSt(th)}/>
        <button onClick={addItem} style={{...primaryBtnSt(th),width:"100%"}}>+ Aggiungi</button>
      </div>

      {pending.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,color:th.sub,marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>
            Da acquistare ({pending.length})
          </div>
          {pending.map(item=><ItemRow key={item.id} item={item} th={th} dark={dark} onToggle={toggleDone} onDelete={deleteItem}/>)}
        </div>
      )}

      {done.length>0&&(
        <div>
          <div style={{fontSize:12,color:th.sub,marginBottom:8,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>
            Acquistati ({done.length})
          </div>
          {done.map(item=><ItemRow key={item.id} item={item} th={th} dark={dark} onToggle={toggleDone} onDelete={deleteItem}/>)}
        </div>
      )}

      {items.length===0&&(
        <div style={{textAlign:"center",padding:30,color:th.sub,fontSize:14}}>
          Nessun articolo ancora.<br/>Aggiungi il primo! 🛒
        </div>
      )}
    </div>
  );
}

function EventDetail({ event, events, th, dark, onBack, onVote, onToast, onStatusChange, onCancelVote, onDelete, onEdit, onShopping }) {
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [confirmVoteDelete, setConfirmVoteDelete] = useState(null);
  const e = events.find(x=>x.id===event.id)||event;
  const sc = STATUS_CONFIG[e.status]||STATUS_CONFIG.open;
  const maxVotes = Math.max(...(e.options||[]).map(o=>(e.votes[o]||[]).length),1);
  const currentUser = localStorage.getItem("bacheca_user")||"";
  const hasVoted = currentUser&&Object.values(e.votes||{}).some(v=>v.includes(currentUser));
  const isFull = e.status==="full";
  const days = daysUntilDeadline(e.deadline);
  const isExpired = days!==null&&days<0;
  const voteBlocked = isFull||isExpired;
  const shoppingCount = (e.shopping_list||[]).length;
  const shoppingDone  = (e.shopping_list||[]).filter(i=>i.done).length;

  const voteButtonLabel = ()=>{ if(isFull)return "🔴 Evento al completo"; if(isExpired)return "⏰ Sondaggio scaduto"; if(hasVoted)return "✅ Hai già votato"; return "🗳️ Vota"; };

  const copyResults = ()=>{
    const lines=[`📅 ${e.title}`,e.date?`🗓 ${e.date}${e.time?" alle "+e.time:""}`:""
      ,`Stato: ${sc.label}`,"","Risultati sondaggio:",
      ...(e.options||[]).map(o=>{const v=e.votes[o]||[];return `• ${o}: ${v.length} vot${v.length===1?"o":"i"}${v.length>0?" ("+v.join(", ")+")":""}`;})
      ,"",`👥 ${(e.participants||[]).length} partecipanti`].filter(l=>l!=="");
    navigator.clipboard?.writeText(lines.join("\n")); onToast("📋 Risultati copiati!");
  };

  return (
    <div>
      <button onClick={onBack} style={backBtnSt(th)}>← Indietro</button>
      <h2 style={{margin:"0 0 6px",fontSize:20,color:th.text}}>{e.title}</h2>

      <div style={{marginBottom:14}}>
        <div style={{fontSize:11,color:th.sub,marginBottom:6,fontWeight:600,letterSpacing:0.5,textTransform:"uppercase"}}>Stato evento</div>
        <div style={{display:"flex",gap:8}}>
          {Object.entries(STATUS_CONFIG).map(([k,v])=>(
            <button key={k} onClick={()=>onStatusChange(e.id,k)}
              style={{flex:1,padding:"8px 4px",borderRadius:12,cursor:"pointer",
                border:`2px solid ${e.status===k?v.color:th.border}`,
                background:e.status===k?(dark?"#1a1a1a":"#fff"):th.input,
                display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{width:14,height:14,borderRadius:"50%",background:v.color,boxShadow:e.status===k?`0 0 8px ${v.color}`:"none"}}/>
              <span style={{fontSize:11,fontWeight:600,color:e.status===k?v.color:th.sub}}>{v.label}</span>
            </button>
          ))}
        </div>
      </div>

      {e.organizer&&<div style={{fontSize:13,color:th.sub,marginBottom:4}}>👤 {e.organizer}</div>}
      {(e.date||e.time)&&<div style={{fontSize:13,color:th.accent,fontWeight:600,marginBottom:4}}>{e.date&&`📅 ${e.date}`}{e.date&&e.time&&"  "}{e.time&&`🕐 ${e.time}`}</div>}
      {e.deadline&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}><span style={{fontSize:13,color:th.sub}}>⏰ Scadenza voti: {e.deadline}</span><DeadlineBadge deadline={e.deadline} dark={dark}/></div>}
      {e.last_edit&&<div style={{fontSize:12,color:dark?"#FAC775":"#854F0B",marginBottom:10,fontStyle:"italic",padding:"6px 10px",background:dark?"#2a2200":"#fffbe6",borderRadius:8}}>✏️ Ultima modifica: {e.last_edit}</div>}
      {e.address&&<div onClick={()=>openMaps(e.address)} style={{...cardSt(th),display:"flex",alignItems:"center",gap:8,cursor:"pointer",marginBottom:12}}><span style={{fontSize:18}}>📍</span><div><div style={{fontSize:13,color:th.text}}>{e.address}</div><div style={{fontSize:11,color:th.accent}}>Apri in Google Maps →</div></div></div>}
      {e.notes&&<div style={{...cardSt(th),marginBottom:12}}><div style={{fontSize:12,color:th.sub,marginBottom:4}}>📝 Note</div><div style={{fontSize:13,color:th.text}}>{e.notes}</div></div>}
      {e.social&&<div style={{...cardSt(th),marginBottom:12}}><div style={{fontSize:12,color:th.sub,marginBottom:4}}>🔗 Link Social / Sito</div><a href={e.social} target="_blank" style={{fontSize:13,color:th.accent,wordBreak:"break-all"}}>{e.social}</a></div>}

      <div style={{...cardSt(th),marginBottom:12}}>
        <div style={{fontSize:12,color:th.sub,marginBottom:10,fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>Risultati sondaggio</div>
        {(e.options||[]).map(o=>{
          const v=e.votes[o]||[]; const pct=Math.round((v.length/maxVotes)*100);
          return (<div key={o} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:th.text}}>{o}</span><span style={{fontSize:13,color:th.sub}}>{v.length} voti</span></div>
            <div style={{background:th.border,borderRadius:6,height:8,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:sc.color,borderRadius:6,transition:"width 0.5s"}}/></div>
            {v.length>0&&<div style={{fontSize:11,color:th.sub,marginTop:3}}>{v.join(", ")}</div>}
          </div>);
        })}
        <div style={{fontSize:12,color:th.sub,marginTop:8}}>👥 {(e.participants||[]).length} partecipanti</div>
      </div>

      {/* Azioni voto */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
        <button onClick={()=>{if(!voteBlocked&&!hasVoted)onVote();}} disabled={voteBlocked||hasVoted}
          style={{...primaryBtnSt(th),flex:1,opacity:(voteBlocked||hasVoted)?0.5:1,cursor:(voteBlocked||hasVoted)?"not-allowed":"pointer",
            background:isFull?STATUS_CONFIG.full.color:isExpired?"#aaa":hasVoted?"#43C59E":th.accent}}>
          {voteButtonLabel()}
        </button>
        <button onClick={copyResults} style={{...btnSt(th),flex:1}}>📋 Copia risultati sondaggio</button>
        {(e.participants||[]).length>0&&!voteBlocked&&(
          <div style={{width:"100%",marginTop:8}}>
            <div style={{fontSize:11,color:th.sub,marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:0.5}}>Ritira un voto</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {(e.participants||[]).map(p=>(
                <button key={p} onClick={()=>setConfirmVoteDelete(confirmVoteDelete===p?null:p)}
                  style={{padding:"4px 10px",borderRadius:20,fontSize:12,cursor:"pointer",
                    border:`1px solid ${confirmVoteDelete===p?"#FC5C65":th.border}`,
                    background:confirmVoteDelete===p?"#FC5C6522":th.input,
                    color:confirmVoteDelete===p?"#FC5C65":th.sub}}>
                  ✕ {p}
                </button>
              ))}
            </div>
            {confirmVoteDelete&&(
              <div style={{marginTop:10,padding:"10px 12px",background:dark?"#2a1a1a":"#fff5f5",borderRadius:10,border:"1px solid #FC5C6544",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                <span style={{fontSize:12,color:th.text}}>Rimuovere il voto di <b>{confirmVoteDelete}</b>?</span>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>setConfirmVoteDelete(null)} style={{...btnSt(th),fontSize:12,padding:"4px 10px"}}>Annulla</button>
                  <button onClick={()=>{onCancelVote(e.id,confirmVoteDelete);setConfirmVoteDelete(null);}}
                    style={{...primaryBtnSt(th),fontSize:12,padding:"4px 10px",background:"#FC5C65"}}>Rimuovi</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Lista della spesa */}
      <button onClick={()=>onShopping(e)}
        style={{...btnSt(th),width:"100%",marginBottom:16,display:"flex",alignItems:"center",justifyContent:"space-between",
          border:`1.5px solid ${th.border}`,padding:"12px 14px"}}>
        <span style={{fontWeight:600,color:th.text}}>🛒 Lista della spesa</span>
        <span style={{fontSize:12,color:th.sub}}>
          {shoppingCount===0?"Nulla ancora":`${shoppingDone}/${shoppingCount} acquistati`}
        </span>
      </button>

      {/* Modifica e Elimina */}
      <div style={{borderTop:`1px solid ${th.border}`,paddingTop:16,display:"flex",flexDirection:"column",gap:8}}>
        <button onClick={()=>onEdit(e)} style={{...btnSt(th),width:"100%",color:th.accent,border:`1.5px solid ${th.accent}`,background:"transparent",fontWeight:600}}>✏️ Modifica sondaggio</button>
        {!confirmDelete
          ? <button onClick={()=>setConfirmDelete(true)} style={{width:"100%",padding:"10px 16px",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:600,color:"#fff",border:"none",background:"#FC5C65"}}>🗑️ Elimina evento definitivamente</button>
          : <div style={{...cardSt(th),border:"1.5px solid #FC5C65"}}>
              <div style={{fontSize:14,color:th.text,marginBottom:6,fontWeight:600}}>Sei sicuro di voler eliminare?</div>
              <div style={{fontSize:12,color:th.sub,marginBottom:14}}>L'operazione è irreversibile e cancellerà tutti i voti.</div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setConfirmDelete(false)} style={{...btnSt(th),flex:1}}>Annulla</button>
                <button onClick={()=>onDelete(e.id)} style={{...primaryBtnSt(th),flex:1,background:"#FC5C65"}}>Sì, elimina</button>
              </div>
            </div>}
      </div>
    </div>
  );
}

function VoteView({ event, events, th, dark, userName, onBack, onSubmit, saving }) {
  const [nameInput, setNameInput] = useState("");
  const [localUser, setLocalUser] = useState(userName);
  const [selections, setSelections] = useState([]);
  const e = events.find(x=>x.id===event.id)||event;
  const isMulti = e.multiSelect||e.multi_select;
  const saveName = ()=>{ if(!nameInput.trim())return; localStorage.setItem("bacheca_user",nameInput.trim()); setLocalUser(nameInput.trim()); };
  return (
    <div>
      <button onClick={onBack} style={backBtnSt(th)}>← Indietro</button>
      <h2 style={{margin:"0 0 4px",fontSize:18,color:th.text}}>{e.title}</h2>
      <div style={{fontSize:13,color:th.sub,marginBottom:16}}>{isMulti?"Puoi selezionare più opzioni":"Seleziona una sola opzione"}</div>
      {!localUser&&<div style={{...cardSt(th),marginBottom:16}}>
        <div style={{fontSize:13,color:th.sub,marginBottom:8}}>Il tuo nome</div>
        <input value={nameInput} onChange={ev=>setNameInput(ev.target.value)} placeholder="Es. Luca" style={inputSt(th)}/>
        <button onClick={saveName} style={{...primaryBtnSt(th),marginTop:8,width:"100%"}}>Conferma nome</button>
      </div>}
      {localUser&&<div style={{fontSize:13,color:th.accent,marginBottom:12}}>Stai votando come: <b>{localUser}</b></div>}
      {(e.options||[]).map(o=>{
        const sel=selections.includes(o);
        return (<div key={o} onClick={()=>{if(isMulti)setSelections(p=>p.includes(o)?p.filter(x=>x!==o):[...p,o]);else setSelections([o]);}}
          style={{...cardSt(th),marginBottom:8,cursor:"pointer",border:`2px solid ${sel?th.accent:th.border}`,background:sel?(dark?"#2a2040":"#f0eeff"):th.card}}>

        style={{...primaryBtnSt(th),width:"100%",marginTop:8,opacity:saving?0.6:1}}>
        {saving?"Salvataggio...":"Conferma voto"}
      </button>
    </div>
  );
}

function App() {
  const [dark, setDark]         = useState(()=>localStorage.getItem("bacheca_dark")==="1");
  const [view, setView]         = useState("calendar");
  const [tab,  setTab]          = useState("cal");
  const [events, setEvents]     = useState([]);
  const [loading, setLoading]   = useState(true);
  const [selEvent, setSelEvent] = useState(null);
  const [calDate, setCalDate]   = useState({y:new Date().getFullYear(),m:new Date().getMonth()});
  const [filteredDay, setFilteredDay] = useState(null);
  const [userName]              = useState(()=>localStorage.getItem("bacheca_user")||"");
  const [toast, setToast]       = useState(null);
  const [saving, setSaving]     = useState(false);

  const toggleDark = ()=>setDark(d=>{localStorage.setItem("bacheca_dark",d?"0":"1");return !d;});
  const th = {bg:dark?"#111":"#f8f8f8",card:dark?"#1e1e1e":"#fff",border:dark?"#2a2a2a":"#eee",text:dark?"#f0f0f0":"#1a1a1a",sub:dark?"#888":"#888",input:dark?"#2a2a2a":"#f4f4f4",accent:"#6C63FF"};

  const showToast = msg=>{setToast(msg);setTimeout(()=>setToast(null),2500);};

  const loadEvents = useCallback(async()=>{
    const {data,error}=await sb.from("events").select("*").order("date",{ascending:true,nullsFirst:false});
    if(error){showToast("❌ Errore caricamento");return;}
    setEvents(data.map(e=>({...e,options:e.options||[],participants:e.participants||[],votes:e.votes||{},shopping_list:e.shopping_list||[],multiSelect:e.multi_select})));
    setLoading(false);
  },[]);

  useEffect(()=>{loadEvents();},[loadEvents]);

  const buildEditLog=(oldE,newForm)=>{
    const changes=[]; const now=new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
    const cmp=(a,b)=>(a||"").trim()===(b||"").trim();
    if(!cmp(oldE.title,newForm.title))changes.push("titolo"); if(!cmp(oldE.date,newForm.date))changes.push("data");
    if(!cmp(oldE.time,newForm.time))changes.push("orario"); if(!cmp(oldE.address,newForm.address))changes.push("luogo");
    if(!cmp(oldE.deadline,newForm.deadline))changes.push("scadenza"); if(!cmp(oldE.notes,newForm.notes))changes.push("note");
    if(!cmp(oldE.social,newForm.social))changes.push("link social"); if(!cmp(oldE.status,newForm.status))changes.push("stato");
    if(!!(oldE.multiSelect||oldE.multi_select)!==!!newForm.multiSelect)changes.push("tipo selezione");
    const oldOpts=JSON.stringify((oldE.options||[]).map(o=>(o||"").trim()).filter(Boolean));
    const newOpts=JSON.stringify(newForm.options.map(o=>(o||"").trim()).filter(Boolean));
    if(oldOpts!==newOpts)changes.push("opzioni");
    if(changes.length===0)return null;
    return `${now} — Modificato: ${changes.join(", ")}`;
  };

  const handleEditSubmit=async(form,oldEvent)=>{
    const opts=form.options.map(o=>o.trim()).filter(Boolean);
    if(!form.title.trim())return showToast("Inserisci un titolo!"); if(opts.length<2)return showToast("Aggiungi almeno 2 opzioni!");
    const editLog=buildEditLog(oldEvent,{...form,options:opts}); if(!editLog){showToast("Nessuna modifica rilevata.");return;}
    const votes={...oldEvent.votes}; opts.forEach(o=>{if(!votes[o])votes[o]=[];});
    setSaving(true);
    const {error}=await sb.from("events").update({title:form.title,organizer:form.organizer,address:form.address,date:form.date,time:form.time,deadline:form.deadline,notes:form.notes,social:form.social,status:form.status,multi_select:form.multiSelect,options:opts,votes,last_edit:editLog}).eq("id",oldEvent.id);
    setSaving(false); if(error)return showToast("❌ Errore salvataggio");
    showToast("✏️ Modifiche salvate!"); await loadEvents(); setView("event");
  };

  const handleCreateSubmit=async(form)=>{
    const opts=form.options.map(o=>o.trim()).filter(Boolean);
    if(!form.title.trim())return showToast("Inserisci un titolo!"); if(opts.length<2)return showToast("Aggiungi almeno 2 opzioni!");
    setSaving(true); const votes={}; opts.forEach(o=>{votes[o]=[];});
    const {error}=await sb.from("events").insert({title:form.title,organizer:form.organizer,address:form.address,date:form.date,time:form.time,deadline:form.deadline,notes:form.notes,social:form.social,status:form.status,multi_select:form.multiSelect,options:opts,participants:[],votes,shopping_list:[]});
    setSaving(false); if(error)return showToast("❌ Errore salvataggio");
    showToast("🎉 Sondaggio creato!"); await loadEvents(); setTab("cal"); setView("calendar");
  };

  const handleVoteSubmit=async(localUser,selections)=>{
    if(!localUser)return showToast("Inserisci il tuo nome prima!"); if(!selections.length)return showToast("Seleziona almeno un'opzione!");
    const e=events.find(x=>x.id===selEvent.id); const votes={...e.votes};
    selections.forEach(o=>{votes[o]=[...new Set([...(votes[o]||[]),localUser])];});
    const participants=[...new Set([...e.participants,localUser])];
    setSaving(true); const {error}=await sb.from("events").update({votes,participants}).eq("id",e.id);
    setSaving(false); if(error)return showToast("❌ Errore salvataggio voto");
    showToast("✅ Voto registrato!"); await loadEvents(); setView("event");
  };

  const handleCancelVote=async(id,user)=>{
    const e=events.find(x=>x.id===id); const votes={};
    Object.entries(e.votes).forEach(([opt,v])=>{votes[opt]=v.filter(x=>x!==user);});
    const participants=(e.participants||[]).filter(p=>p!==user);
    const {error}=await sb.from("events").update({votes,participants}).eq("id",id);
    if(error)return showToast("❌ Errore"); showToast("↩️ Voto ritirato!"); await loadEvents();
  };

  const handleStatusChange=async(id,status)=>{
    const {error}=await sb.from("events").update({status}).eq("id",id);
    if(error)return showToast("❌ Errore"); showToast("✅ Stato aggiornato!"); await loadEvents();
  };

  const handleDelete=async(id)=>{
    const {error}=await sb.from("events").delete().eq("id",id);
    if(error)return showToast("❌ Errore"); showToast("🗑️ Evento eliminato!"); await loadEvents(); setView("calendar");
  };

  const handleShoppingSave=async(id,shopping_list)=>{
    const {error}=await sb.from("events").update({shopping_list}).eq("id",id);
    if(error){showToast("❌ Errore salvataggio");return;}
    setEvents(p=>p.map(e=>e.id===id?{...e,shopping_list}:e));
  };

  const openEvent=e=>{setSelEvent(e);setView("event");};

  const mainContent=()=>{
    if(view==="event")return <EventDetail event={selEvent} events={events} th={th} dark={dark} onBack={()=>setView("calendar")} onVote={()=>setView("vote")} onToast={showToast} onStatusChange={handleStatusChange} onCancelVote={handleCancelVote} onDelete={handleDelete} onEdit={e=>{setSelEvent(e);setView("edit");}} onShopping={e=>{setSelEvent(e);setView("shopping");}}/>;
    if(view==="vote")return <VoteView event={selEvent} events={events} th={th} dark={dark} userName={userName} onBack={()=>setView("event")} onSubmit={handleVoteSubmit} saving={saving}/>;
    if(view==="edit")return <EditView event={selEvent} th={th} dark={dark} onBack={()=>setView("event")} onSubmit={handleEditSubmit} saving={saving}/>;
    if(view==="shopping")return <ShoppingListView event={selEvent} events={events} th={th} dark={dark} onBack={()=>setView("event")} onSave={handleShoppingSave} saving={saving}/>;
    if(tab==="new")return <CreateView th={th} dark={dark} onBack={()=>{setTab("cal");setView("calendar");}} onSubmit={handleCreateSubmit} saving={saving}/>;
    if(tab==="search")return <SearchView events={events} th={th} onOpen={openEvent} onBack={()=>setTab("cal")}/>;
    return (
      <div>
        <CalGrid calDate={calDate} setCalDate={setCalDate} events={events} th={th} onDayClick={(ds,evs)=>setFilteredDay({date:ds,events:evs})}/>
        <div style={{marginTop:20}}>
          {filteredDay?(
            <>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <div style={{fontSize:13,fontWeight:600,color:th.sub,letterSpacing:1,textTransform:"uppercase"}}>📅 {new Date(filteredDay.date+"T00:00:00").toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"})}</div>
                <button onClick={()=>setFilteredDay(null)} style={{...btnSt(th),fontSize:12,padding:"4px 10px"}}>✕ Tutti</button>
              </div>
              {filteredDay.events.map(e=><EventCard key={e.id} e={e} th={th} onOpen={openEvent}/>)}
            </>
          ):(
            <>
              <div style={{fontSize:13,fontWeight:600,color:th.sub,marginBottom:8,letterSpacing:1,textTransform:"uppercase"}}>Tutti gli eventi</div>
              {loading&&<div style={{color:th.sub,fontSize:13,textAlign:"center",padding:20}}>Caricamento...</div>}
              {!loading&&events.length===0&&<div style={{color:th.sub,fontSize:14,textAlign:"center",padding:20}}>Nessun evento ancora.<br/>Creane uno! 🎉</div>}
              {events.map(e=><EventCard key={e.id} e={e} th={th} onOpen={openEvent}/>)}
            </>
          )}
        </div>
      </div>
    );
  };

  return (
    <div style={{background:th.bg,minHeight:"100vh",maxWidth:430,margin:"0 auto",position:"relative"}}>
      <div style={{background:th.card,borderBottom:`1px solid ${th.border}`,padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10}}>
        <div>
          <div style={{fontWeight:700,fontSize:17,color:th.text}}>📅 Bacheca</div>
          <div style={{fontSize:11,color:th.sub}}>{MONTHS_IT[calDate.m]} {calDate.y}</div>
        </div>
        <button onClick={toggleDark} style={{background:th.input,border:"none",borderRadius:20,padding:"6px 14px",cursor:"pointer",fontSize:13,color:th.text}}>{dark?"☀️":"🌙"}</button>
      </div>
      <div style={{padding:16,paddingBottom:90}}>{mainContent()}</div>
      {toast&&<div style={{position:"fixed",bottom:80,left:"50%",transform:"translateX(-50%)",background:"#333",color:"#fff",padding:"10px 20px",borderRadius:20,fontSize:13,zIndex:100,whiteSpace:"nowrap"}}>{toast}</div>}
      {view==="calendar"&&(
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:th.card,borderTop:`1px solid ${th.border}`,display:"flex",padding:"10px 0 14px",zIndex:10}}>
          {[["cal","🗓️","Calendario"],["new","➕","Crea"],["search","🔍","Cerca"]].map(([t,icon,label])=>(
            <button key={t} onClick={()=>setTab(t)} style={{flex:1,border:"none",background:"transparent",cursor:"pointer",color:tab===t?th.accent:th.sub,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:22}}>{icon}</span>
              <span style={{fontSize:10,fontWeight:tab===t?700:400}}>{label}</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
